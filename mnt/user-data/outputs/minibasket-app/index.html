<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>MiniBasket Quintetos</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mini5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --orange:#FF6B1A;--orange-dim:#c94e00;--gold:#FFB800;
      --navy:#0A0E1A;--navy2:#121828;--navy3:#1C2437;--navy4:#252E45;
      --white:#F0F4FF;--muted:#8892AA;
      --danger:#FF3B5C;--green:#2ECC71;--amber:#FF9A3C;--blue:#5BC8FF;
      --radius:14px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);overflow-x:hidden}
    #root{min-height:100dvh;display:flex;flex-direction:column}

    /* TOPBAR */
    .topbar{background:var(--navy2);padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--orange);position:sticky;top:0;z-index:100}
    .topbar-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;flex-shrink:0;letter-spacing:1px}
    .topbar-logo span{color:var(--orange)}
    .team-switcher{flex:1;min-width:0;background:var(--navy4);border:1px solid var(--navy3);border-radius:10px;padding:7px 11px;display:flex;align-items:center;gap:7px;cursor:pointer}
    .team-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
    .team-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cat-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
    .cat-mini{background:#0d1e30;color:var(--blue)}
    .cat-premini{background:#1a0d30;color:#B07EFF}
    .sw-arrow{color:var(--muted);font-size:11px;flex-shrink:0}

    /* TABS */
    .tabs{display:flex;background:var(--navy2);border-bottom:1px solid var(--navy4)}
    .tab-btn{flex:1;padding:11px 6px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent}
    .tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
    .content{flex:1;padding:14px;padding-bottom:90px;overflow-y:auto}

    /* NOTICES */
    .notice{border-radius:10px;padding:10px 13px;margin-bottom:10px;font-size:12px;font-weight:500;line-height:1.55}
    .n-blue  {background:#0a1a2a;border:1px solid #004a8a;color:var(--blue)}
    .n-green {background:#0a2a18;border:1px solid #006a30;color:var(--green)}
    .n-gold  {background:#2a1f0a;border:1px solid #6a4800;color:var(--gold)}
    .n-red   {background:#2a0a10;border:1px solid #8a0020;color:var(--danger)}
    .n-purple{background:#160a20;border:1px solid #6a3a9a;color:#C89AFF}

    /* SECTION TITLE */
    .sec{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .sec::after{content:'';flex:1;height:1px;background:var(--navy4)}
    .sec-mt{margin-top:10px}

    /* STAT BOXES */
    .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
    .stat-box{background:var(--navy3);border-radius:10px;border:1px solid var(--navy4);padding:11px 8px;text-align:center}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:var(--orange);line-height:1}
    .stat-val-sm{font-size:16px}
    .stat-val-ok{color:var(--green)}
    .stat-val-bad{color:var(--danger)}
    .stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

    /* PLAYER CARD */
    .pcard{background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--radius);padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
    .pcard.uncalled{opacity:.4}
    .pcard.uncalled .pname{text-decoration:line-through}
    .pdorsal{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;width:34px;text-align:center;flex-shrink:0}
    .pinfo{flex:1;min-width:0}
    .pname{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
    .pmeta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}

    /* CHAR BADGES */
    .cbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase}
    .cb-velocidad    {background:rgba(91,200,255,.15);color:var(--blue)}
    .cb-buendefensor {background:rgba(46,204,113,.15);color:var(--green)}
    .cb-alto         {background:rgba(255,154,60,.15);color:var(--amber)}
    .cb-anotador     {background:rgba(255,184,0,.15);color:var(--gold)}
    .cb-polivalente  {background:rgba(176,126,255,.15);color:#B07EFF}
    .cb-normal       {background:rgba(136,146,170,.15);color:var(--muted)}

    /* TOGGLE */
    .toggle{position:relative;width:36px;height:20px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .tslider{position:absolute;inset:0;background:var(--navy4);border-radius:10px;cursor:pointer;transition:background .2s}
    .tslider::before{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--muted);top:3px;left:3px;transition:transform .2s,background .2s}
    .toggle input:checked+.tslider{background:var(--green)}
    .toggle input:checked+.tslider::before{transform:translateX(16px);background:white}

    /* ICON BUTTONS & FAB */
    .pactions{display:flex;gap:5px;flex-shrink:0;align-items:center}
    .ibtn{width:30px;height:30px;border-radius:8px;background:transparent;border:1px solid var(--navy4);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .ibtn-cap{border-color:var(--gold);color:var(--gold);background:rgba(255,184,0,.1)}
    .ibtn-del{color:var(--danger);border-color:rgba(255,59,92,.3)}
    .ibtn-edit{margin-left:6px}
    .fab{position:fixed;bottom:22px;right:18px;width:54px;height:54px;border-radius:50%;background:var(--orange);border:none;box-shadow:0 4px 18px rgba(255,107,26,.5);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;z-index:90;color:white}

    /* BUTTONS */
    .btn{padding:10px 18px;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .btn-primary{background:var(--orange);color:white}
    .btn-primary:active{background:var(--orange-dim)}
    .btn-primary:disabled{opacity:.4;pointer-events:none}
    .btn-secondary{background:var(--navy3);color:var(--white);border:1px solid var(--navy4)}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--navy4)}
    .btn-danger-ghost{background:transparent;color:var(--danger);border:1px solid var(--danger)}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
    .btn-block{width:100%}
    .btn-mt{margin-top:8px}
    .btn-mt2{margin-top:14px}

    /* FORMS */
    .fgrp{margin-bottom:14px}
    .flbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
    .finp{width:100%;padding:10px 12px;background:var(--navy3);border:1px solid var(--navy4);border-radius:10px;color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;outline:none;-webkit-appearance:none}
    .finp:focus{border-color:var(--orange)}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .cgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .copt{padding:9px 6px;border:2px solid var(--navy4);border-radius:10px;background:var(--navy3);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-align:center;text-transform:uppercase;cursor:pointer}
    .copt.csel{border-color:var(--orange);color:var(--orange);background:rgba(255,107,26,.1)}

    /* CATEGORY SELECTOR */
    .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
    .cat-opt{padding:14px 10px;border:2px solid var(--navy4);border-radius:12px;background:var(--navy3);text-align:center;cursor:pointer}
    .cat-icon{font-size:28px;display:block;margin-bottom:6px}
    .cat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;text-transform:uppercase}
    .cat-sub{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4}
    .cat-opt.co-mini   {border-color:var(--blue);background:#0a1a2a}
    .cat-opt.co-premini{border-color:#B07EFF;background:#160a20}
    .cat-lbl-mini   {color:var(--blue)}
    .cat-lbl-premini{color:#B07EFF}
    .notice-mt{margin-top:8px}

    /* COLORS */
    .cgrid2{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:6px}
    .copt2{width:100%;aspect-ratio:1;border-radius:50%;border:3px solid transparent;cursor:pointer}
    .copt2.csel2{border-color:var(--white)}

    /* MODALS */
    .overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);display:flex;align-items:flex-end}
    .sheet{background:var(--navy2);border-radius:20px 20px 0 0;border-top:2px solid var(--orange);width:100%;padding:18px 18px 36px;max-height:93dvh;overflow-y:auto;animation:slideUp .22s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .shandle{width:38px;height:4px;border-radius:2px;background:var(--navy4);margin:0 auto 18px}
    .stitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;text-transform:uppercase;margin-bottom:16px;color:var(--orange)}

    /* INJURY CONFIRM (centred) */
    .ctr-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px}
    .ctr-box{background:var(--navy2);border-radius:20px;width:100%;max-width:360px;overflow:hidden}
    .ihead{background:#1a0808;border-bottom:1px solid var(--danger);padding:16px 20px;text-align:center}
    .ihead-icon{font-size:36px;margin-bottom:6px}
    .ihead-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;text-transform:uppercase;color:var(--danger)}
    .ihead-sub{font-size:11px;color:var(--muted);margin-top:3px}
    .ibody{padding:16px 20px}
    .itypes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .itype{padding:12px 8px;border-radius:12px;border:2px solid var(--navy4);cursor:pointer;text-align:center;background:var(--navy3)}
    .itype-icon{font-size:26px;display:block;margin-bottom:5px}
    .itype-lbl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;text-transform:uppercase;margin-bottom:2px}
    .itype-desc{font-size:10px;color:var(--muted);line-height:1.4}
    .itype-lbl-leve {color:var(--amber)}
    .itype-lbl-grave{color:var(--danger)}
    .sel-leve {border-color:var(--amber)!important;background:#2a1500!important}
    .sel-grave{border-color:var(--danger)!important;background:#2a0808!important}
    .irule{background:var(--navy3);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:14px;border-left:3px solid var(--navy4)}
    .irule-leve {border-left-color:var(--amber)}
    .irule-grave{border-left-color:var(--danger)}
    .irule strong{color:var(--white)}
    .iactions{display:flex;gap:10px}

    /* SEXTO CARDS */
    .scard{background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
    .scard-inj{border-color:var(--danger)}
    .scard-inc{border-color:var(--amber)}
    .shead{padding:10px 14px;background:var(--navy3);display:flex;align-items:center;gap:8px}
    .snum{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:#fff;flex-shrink:0}
    .stitle2{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:1px;flex:1}
    .smeta{font-size:10px;color:var(--muted)}
    .sscore{font-size:11px;color:var(--gold);font-weight:700}
    .sbody{padding:4px 0}
    .srow{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--navy4)}
    .srow:last-of-type{border-bottom:none}
    .srow-inj{background:#1a0808;opacity:.7}
    .spos{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--orange);width:54px;text-transform:uppercase;flex-shrink:0}
    .spname{flex:1;font-size:13px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sdorsal{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--muted);width:26px;text-align:right;flex-shrink:0}
    .inj-btn{background:transparent;border:1px solid var(--navy4);border-radius:6px;padding:3px 6px;cursor:pointer;color:var(--muted);font-size:12px;flex-shrink:0}
    .inj-footer{padding:7px 14px;background:#160a0a;border-top:1px solid #3a1020;font-size:11px;display:flex;flex-direction:column;gap:4px}
    .inj-footer-inc{padding:8px 14px;font-size:11px;color:var(--amber);background:#1a1000;border-top:1px solid #4a3000}

    /* MICRO BADGES */
    .mb{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-left:4px}
    .mb-leve {background:#2a1500;color:var(--amber);border:1px solid var(--amber)}
    .mb-grave{background:#2a0a10;color:var(--danger);border:1px solid var(--danger)}
    .mb-back {background:#0a1a2a;color:var(--blue);border:1px solid var(--blue)}
    .mb-cap  {background:rgba(255,184,0,.15);color:var(--gold);border:1px solid rgba(255,184,0,.4)}

    /* INJURY PANEL */
    .inj-panel{background:#160a0a;border:1px solid #4a1020;border-radius:12px;padding:12px 14px;margin-bottom:12px}
    .inj-panel-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--danger);margin-bottom:8px}
    .inj-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #2a1020}
    .inj-item:last-child{border-bottom:none}
    .inj-dnum{width:30px;height:30px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900}
    .inj-dnum-leve {background:#2a1500;border:2px solid var(--amber);color:var(--amber)}
    .inj-dnum-grave{background:#2a0808;border:2px solid var(--danger);color:var(--danger)}
    .inj-info{flex:1;min-width:0}
    .inj-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700}
    .inj-detail{font-size:10px;color:var(--muted);margin-top:1px}
    .inj-ok{color:var(--green);font-size:9px}
    .inj-warn{color:var(--amber);font-size:9px}

    /* TEAM CARDS */
    .tcard{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--navy3);border-radius:var(--radius);border:2px solid var(--navy4);margin-bottom:8px}
    .tcard-active{border-color:var(--orange)}
    .tball{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .tinfo{flex:1;min-width:0;cursor:pointer}
    .tname{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800}
    .tsub{font-size:11px;color:var(--muted);margin-top:2px}
    .tactions{display:flex;gap:6px;flex-shrink:0}

    /* CONFIRM BOX */
    .confirm-box{background:var(--navy3);border:1px solid var(--navy4);border-radius:var(--radius);padding:14px;margin-top:8px;text-align:center}
    .confirm-p{font-size:13px;color:var(--muted);margin-bottom:10px}
    .confirm-btns{display:flex;gap:8px;justify-content:center}

    /* EMPTY STATE */
    .empty-state{text-align:center;padding:44px 20px;color:var(--muted)}
    .empty-icon{font-size:52px;display:block;margin-bottom:14px}
    .empty-title{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:800;text-transform:uppercase;margin-bottom:7px;color:var(--white)}
    .empty-p{font-size:13px}

    /* PROGRESS BAR */
    .barwrap{background:var(--navy4);border-radius:4px;height:6px;overflow:hidden;margin-top:5px}
    .barfill{height:100%;border-radius:4px}

    /* HEADER ROW */
    .hrow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .hrow-title{flex:1}

    /* STATS CARD */
    .stats-pcard{background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--radius);padding:11px 13px;margin-bottom:8px}
    .stats-row{display:flex;align-items:center;gap:10px}
    .stats-count{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-align:right}
    .stats-count-ok {color:var(--green)}
    .stats-count-bad{color:var(--danger)}
    .stats-label{font-size:10px;color:var(--muted);margin-top:4px}

    /* GENERATE SCREEN */
    .gen-wrap{text-align:center;padding-top:40px}
    .gen-icon{font-size:56px;margin-bottom:16px}
    .gen-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;margin-bottom:8px;color:var(--white)}
    .gen-sub{color:var(--muted);font-size:14px;margin-bottom:18px}

    /* EDIT SEXTO */
    .edit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .edit-score{font-size:12px;color:var(--gold)}
    .edit-pos{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--orange);width:52px;flex-shrink:0;text-transform:uppercase}
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import{createElement as h,useState,useEffect,useCallback,useMemo,Fragment}from'https://esm.sh/react@18.2.0';
import{createRoot}from'https://esm.sh/react-dom@18.2.0/client';
import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);

/* ─── CONSTANTS ─── */
const CHARS=['Velocidad','Buen Defensor','Alto','Anotador','Polivalente','Normal'];
const TCOLORS=['#FF6B1A','#3498DB','#2ECC71','#9B59B6','#E74C3C','#FFB800','#1ABC9C','#E91E63','#00BCD4','#8BC34A','#FF5722','#607D8B'];
const STORE_KEY='mini5_v7';
const CAT={
  mini:    {label:'Minibasket',   short:'MINI',   courtSize:5,minConv:5,maxPlayers:12},
  premini: {label:'PreMinibasket',short:'PREMINI',courtSize:4,minConv:4,maxPlayers:10},
};
const POS5=['Base','Escolta','Alero','Ala-Pívot','Pívot'];
const POS4=['Base','Escolta','Alero','Pívot'];
const getPos=cat=>cat==='premini'?POS4:POS5;
const getCS=cat=>CAT[cat]?.courtSize??5;

/* ─── STORAGE ─── */
function loadState(){try{const d=localStorage.getItem(STORE_KEY);if(d)return JSON.parse(d);}catch(e){}return null;}
function saveState(s){try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch(e){}}
function defaultState(){
  const a=crypto.randomUUID(),b=crypto.randomUUID();
  return{activeTeamId:a,teams:[
    {id:a,name:'Mi Equipo',color:'#FF6B1A',category:'mini',   captainId:null,players:[]},
    {id:b,name:'Equipo 2', color:'#3498DB',category:'premini',captainId:null,players:[]},
  ]};
}

/* ─── INJURY HELPERS ─── */
function pAvail(pid,s,inj){
  const i=inj[pid];
  if(!i)return true;
  if(i.type==='leve') return s!==i.sextoIndex;
  if(i.type==='grave')return s<=i.sextoIndex;
  return true;
}

/* ─── ALGORITHM ─── */
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function cps(char,pos){
  const M={'Velocidad':{Base:5,Escolta:3,Alero:2,'Ala-Pívot':1,'Pívot':0},'Buen Defensor':{Base:2,Escolta:3,Alero:3,'Ala-Pívot':4,'Pívot':3},'Alto':{Base:0,Escolta:1,Alero:2,'Ala-Pívot':4,'Pívot':5},'Anotador':{Base:3,Escolta:5,Alero:4,'Ala-Pívot':2,'Pívot':2},'Polivalente':{Base:3,Escolta:3,Alero:4,'Ala-Pívot':3,'Pívot':3},'Normal':{Base:2,Escolta:2,Alero:2,'Ala-Pívot':2,'Pívot':2}};
  return(M[char]||M['Normal'])[pos]??2;
}

function assignPos(players,cat){
  const positions=getPos(cat),used=new Set();
  return positions.map(pos=>{
    let best=null,bs=-1;
    players.forEach(p=>{if(used.has(p.id))return;const sc=cps(p.characteristic,pos);if(sc>bs){bs=sc;best=p;}});
    if(best)used.add(best.id);
    return{position:pos,player:best,score:bs<0?0:bs};
  });
}

function genLineups(players,cat,injuries){
  const inj=injuries||{},cs=getCS(cat),n=players.length;
  if(n<cs)return null;
  const played=Array(n).fill(0),lineups=[],warnings=[];
  for(let s=0;s<6;s++){
    const avail=players.map((p,i)=>({p,i})).filter(x=>pAvail(x.p.id,s,inj));
    if(avail.length<cs){
      warnings.push('Sexto '+(s+1)+': solo '+avail.length+' jugador'+(avail.length!==1?'es':'')+' disponible'+(avail.length!==1?'s':'')+'. Partido continúa (Art. 20.2.5 FEGABA).');
      avail.forEach(x=>played[x.i]++);
      lineups.push({lineup:assignPos(avail.slice(0,cs).map(x=>x.p),cat),score:0,incomplete:true,availCount:avail.length});
      continue;
    }
    const rem6=6-s;
    const ra=avail.map(x=>{let c=0;for(let ss=s;ss<6;ss++)if(pAvail(x.p.id,ss,inj))c++;return c;});
    const totalR=ra.reduce((a,b)=>a+b,0);
    const prio=avail.map((x,k)=>{
      const rem=ra[k],ap=played[x.i];
      return{i:x.i,p:x.p,mustPlay:ap<2&&rem<=(2-ap),remTarget:totalR>0?Math.round((rem/totalR)*cs*rem6):0};
    });
    const must=prio.filter(x=>x.mustPlay);
    const opt=shuffle(prio.filter(x=>!x.mustPlay)).sort((a,b)=>b.remTarget-a.remTarget);
    const seen=new Set();
    let sel=[...must,...opt].filter(x=>seen.has(x.i)?false:(seen.add(x.i),true)).slice(0,cs);
    if(sel.length<cs){const ss=new Set(sel.map(x=>x.i));prio.filter(x=>!ss.has(x.i)).forEach(x=>{if(sel.length<cs)sel.push(x);});}
    sel.forEach(x=>played[x.i]++);
    const lineup=assignPos(sel.map(x=>x.p),cat);
    lineups.push({lineup,score:lineup.reduce((a,l)=>a+l.score,0),incomplete:false,availCount:avail.length});
  }
  const minViol=players.map((p,i)=>{
    const ip=inj[p.id];let av=0;for(let s=0;s<6;s++)if(pAvail(p.id,s,inj))av++;
    return{p,played:played[i],exempt:ip!==undefined&&av<2};
  }).filter(x=>x.played<2&&!x.exempt);
  return{lineups,played,warnings,minViol};
}

        <div class="inj-panel">
          <div class="inj-panel-title">🤕 Bajas — Art. 20.2 FEGABA</div>
          ${injList.map(({player,type,sextoIndex,pid})=>{
            const played=result?result.played[called.findIndex(p=>p.id===player.id)]:0;
            const lv=type==='leve';
            return html`
              <div key=${pid} class="inj-item">
                <div class=${'inj-dnum inj-dnum-'+(lv?'leve':'grave')}>${player.dorsal}</div>
                <div class="inj-info">
                  <div class="inj-name">${player.name}</div>
                  <div class="inj-detail">
                    ${lv?'🤕 Leve — sale Sexto '+(sextoIndex+1)+', vuelve Sexto '+(sextoIndex<5?sextoIndex+2:'—'):'🚑 Grave — baja definitiva desde Sexto '+(sextoIndex+2)}
                    ${' · '+played+' sexto'+(played!==1?'s':'')}
                    ${played<2?html`<span class="inj-warn"> (exento mínimo)</span>`:html`<span class="inj-ok"> ✓ mín OK</span>`}
                  </div>
                </div>
                <button class="btn btn-ghost btn-sm" onClick=${()=>removeInj(pid)}>↩</button>
              </div>`;
          })}
        </div>
      `}
      ${result?.warnings?.map((w,i)=>html`<div key=${i} class="notice n-gold">⚠️ ${w}</div>`)}
      ${result?.minViol?.length>0&&html`<div class="notice n-red">⛔ Menos de 2 sextos: ${result.minViol.map(v=>'#'+v.p.dorsal+' '+v.p.name).join(', ')}</div>`}
      ${result?.lineups.map((sexto,si)=>{
        const injHere=called.filter(p=>{const inj=injuries[p.id];return inj&&inj.sextoIndex===si;});
        const cls='scard'+(injHere.length>0?' scard-inj':'')+(sexto.incomplete?' scard-inc':'');
        return html`
          <div key=${si} class=${cls}>
            <div class="shead">
              <div class="snum" style=${{background:sexto.incomplete?'var(--amber)':team.color}}>${si+1}</div>
              <div style=${{flex:1,minWidth:0}}>
                <div class="stitle2">Sexto ${si+1}</div>
                <div class="smeta">${sexto.availCount} disponibles${injHere.length>0?' · 🤕 '+injHere.length+' lesión'+(injHere.length>1?'es':''):''}</div>
              </div>
              ${!sexto.incomplete&&html`<div class="sscore">Eq: ${sexto.score}pts</div>`}
              <button class="ibtn ibtn-edit" title="Editar manualmente" onClick=${()=>setEditSi(si)}>✏️</button>
            </div>
            <div class="sbody">
              ${sexto.lineup.map(({position,player})=>{
                if(!player)return null;
                const injP=injuries[player.id];
                const isNow=injP&&injP.sextoIndex===si;
                const isBack=injP&&injP.type==='leve'&&injP.sextoIndex<si;
                const isCap=team.captainId===player.id;
                return html`
                  <div key=${player.id} class=${'srow'+(isNow?' srow-inj':'')}>
                    <div class="spos">${position}</div>
                    <div class="spname">
                      ${isCap?'👑 ':''}${player.name}
                      ${isNow&&injP.type==='leve'&&html`<span class="mb mb-leve">🤕 leve</span>`}
                      ${isNow&&injP.type==='grave'&&html`<span class="mb mb-grave">🚑 grave</span>`}
                      ${isBack&&html`<span class="mb mb-back">🔄 vuelve</span>`}
                      ${isCap&&html`<span class="mb mb-cap">CAP</span>`}
                    </div>
                    <div class="sdorsal">#${player.dorsal}</div>
                    ${!injP&&html`<button class="inj-btn" title="Registrar lesión" onClick=${()=>setPending({player,sextoIndex:si})}>🤕</button>`}
                    ${injP&&html`<button class="btn btn-ghost btn-sm" style=${{fontSize:10,padding:'2px 6px'}} onClick=${()=>removeInj(player.id)}>↩</button>`}
                  </div>`;
              })}
            </div>
            ${injHere.length>0&&html`
              <div class="inj-footer">
                ${injHere.map(p=>{const inj=injuries[p.id];return html`
                  <span key=${p.id} style=${{color:inj.type==='grave'?'var(--danger)':'var(--amber)'}}>
                    ${inj.type==='leve'?'🤕':'🚑'} <strong>#${p.dorsal} ${p.name}</strong>
                    ${inj.type==='leve'?' — Leve: sale Sexto '+(si+1)+', puede volver Sexto '+(si+2):' — Grave: baja definitiva'}
                  </span>`;})}
              </div>
            `}
            ${sexto.incomplete&&html`<div class="inj-footer-inc">⚠️ Art. 20.2.5 FEGABA: partido continúa con ${sexto.availCount} jugador${sexto.availCount!==1?'es':''}.</div>`}
          </div>`;
      })}
      ${pending&&html`<${InjuryModal} player=${pending.player} sextoIndex=${pending.sextoIndex} onConfirm=${confirmInj} onCancel=${()=>setPending(null)} />`}
      ${editSi!==null&&result&&html`<${EditSexto} sextoIndex=${editSi} lineup=${result.lineups[editSi].lineup} allPlayers=${called} injuries=${injuries} teamColor=${team.color} cat=${cat} onSave=${np=>saveEdit(editSi,np)} onClose=${()=>setEditSi(null)} />`}
    <//>`;
}

/* ─── STATS TAB ─── */
function StatsTab({team}){
  const cat=team.category||'mini',catInfo=CAT[cat];
  const called=team.players.filter(p=>p.called!==false);
  const result=useMemo(()=>genLineups(called,cat,{}),[team]);
  if(!result)return html`
    <div class="empty-state">
      <span class="empty-icon">📊</span>
      <div class="empty-title">Sin datos</div>
      <p class="empty-p">Necesitas al menos ${catInfo.minConv} convocados.</p>
    </div>`;
  return html`
    <${Fragment}>
      <div class="notice n-blue" style=${{marginBottom:14}}>ℹ️ ${catInfo.label} · Mínimo 2 sextos/jugador (Art. 20.2.3 FEGABA)</div>
      <div class="sec">Reparto de Sextos</div>
      ${called.map((p,i)=>{
        const count=result.played[i],ok=count>=2,isCap=team.captainId===p.id;
        return html`
          <div key=${p.id} class="stats-pcard">
            <div class="stats-row">
              <div class="pdorsal" style=${{color:team.color,fontSize:20,width:30}}>${p.dorsal}</div>
              <div style=${{flex:1,minWidth:0}}>
                <div class="pname" style=${{fontSize:15}}>
                  ${isCap&&html`<span>👑 </span>`}${p.name}
                  ${isCap&&html`<span class="mb mb-cap">CAP</span>`}
                </div>
                <${CharBadge} char=${p.characteristic} />
              </div>
              <div class=${'stats-count '+(ok?'stats-count-ok':'stats-count-bad')}>
                ${count}<span style=${{fontSize:12,color:'var(--muted)'}}>/6</span>
              </div>
            </div>
            <div class="barwrap">
              <div class="barfill" style=${{width:(count/6*100)+'%',background:ok?'var(--green)':'var(--danger)'}}></div>
            </div>
            <div class="stats-label">${ok?'✅ Mínimo cumplido':'⚠️ Bajo mínimo reglamentario'}</div>
          </div>`;
      })}
    <//>`;
}

/* ─── APP ─── */
function App(){
  const[state,setState]=useState(()=>loadState()||defaultState());
  const[tab,setTab]=useState('roster');
  const[showTeams,setShowTeams]=useState(false);
  const[showNewTeam,setShowNewTeam]=useState(false);
  const[editingTeam,setEditingTeam]=useState(null);
  useEffect(()=>saveState(state),[state]);
  const activeTeam=state.teams.find(t=>t.id===state.activeTeamId)||state.teams[0];
  const catInfo=CAT[activeTeam.category||'mini'];
  const updTeam=(id,patch)=>setState(s=>({...s,teams:s.teams.map(t=>t.id===id?{...t,...patch}:t)}));
  const saveTeam=t=>setState(s=>{
    const ex=s.teams.find(x=>x.id===t.id);
    if(ex)return{...s,teams:s.teams.map(x=>x.id===t.id?{...x,name:t.name,color:t.color,category:t.category}:x)};
    return{...s,teams:[...s.teams,t],activeTeamId:t.id};
  });
  const delTeam=id=>setState(s=>{const teams=s.teams.filter(t=>t.id!==id);return{teams,activeTeamId:s.activeTeamId===id?teams[0].id:s.activeTeamId};});
  const TABS=[{id:'roster',label:'👕 Plantilla'},{id:'lineups',label:'🏀 Quintetos'},{id:'stats',label:'📊 Reparto'}];
  return html`
    <${Fragment}>
      <div class="topbar">
        <div class="topbar-logo"><span>MINI</span>5</div>
        <div class="team-switcher" onClick=${()=>setShowTeams(true)}>
          <div class="team-dot" style=${{background:activeTeam.color}}></div>
          <div class="team-name">${activeTeam.name}</div>
          <span class=${'cat-badge cat-'+(activeTeam.category||'mini')}>${catInfo.short}</span>
          <div class="sw-arrow">▼</div>
        </div>
      </div>
      <div class="tabs">${TABS.map(t=>html`<button key=${t.id} class=${'tab-btn'+(tab===t.id?' active':'')} onClick=${()=>setTab(t.id)}>${t.label}</button>`)}</div>
      <div class="content">
        ${tab==='roster' &&html`<${RosterTab}  team=${activeTeam} onUpdateTeam=${p=>updTeam(activeTeam.id,p)} />`}
        ${tab==='lineups'&&html`<${LineupsTab} team=${activeTeam} />`}
        ${tab==='stats'  &&html`<${StatsTab}   team=${activeTeam} />`}
      </div>
      ${showTeams&&html`<${TeamsModal} teams=${state.teams} activeId=${state.activeTeamId}
        onSelect=${id=>setState(s=>({...s,activeTeamId:id}))}
        onClose=${()=>setShowTeams(false)}
        onNew=${()=>{setEditingTeam(null);setShowTeams(false);setShowNewTeam(true);}}
        onEdit=${t=>{setEditingTeam(t);setShowTeams(false);setShowNewTeam(true);}}
        onDelete=${delTeam} />`}
      ${showNewTeam&&html`<${TeamForm} editing=${editingTeam}
        onClose=${()=>{setShowNewTeam(false);setEditingTeam(null);}}
        onSave=${saveTeam} />`}
    <//>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
</body>
</html>
