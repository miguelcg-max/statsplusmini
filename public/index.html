            <div class="modal-header"><div class="modal-title">Novo Partido</div><button class="modal-close" onClick=${onClose}>×</button></div>
            <div class="modal-body">
              <div class="info-box"><strong>${config.name}:</strong> ${config.periods} ${config.periodName.toLowerCase()}s × ${config.periodTime/60} min. ${config.timeouts} tempos mortos.</div>
              ${filtered.length > 0 ? html`
                <div class="form-group"><label class="form-label">O meu equipo</label><select class="form-select" value=${selectedTeamId} onChange=${e => { setSelectedTeamId(e.target.value); const t = filtered.find(t => t.id === e.target.value); if (t) setHomeTeam(t.name); }}><option value="">-- Seleccionar equipo --</option>${filtered.map(t => html`<option key=${t.id} value=${t.id}>${t.emoji} ${t.name} (${t.players?.length || 0} xog.)</option>`)}</select></div>
              ` : html`<div class="form-group"><label class="form-label">Equipo Local</label><input type="text" class="form-input" placeholder="Nome do equipo" value=${homeTeam} onInput=${e => setHomeTeam(e.target.value)} /></div>`}
              <div class="form-group"><label class="form-label">Equipo Rival</label><input type="text" class="form-input" placeholder="Nome do rival" value=${awayTeam} onInput=${e => setAwayTeam(e.target.value)} /></div>
              ${selectedTeam && selectedTeam.players?.length < config.playersOnCourt && html`<div class="warning-box">⚠️ O equipo ten ${selectedTeam.players?.length || 0} xogadores. Necesitas polo menos ${config.playersOnCourt}.</div>`}
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" style="flex: 1;" onClick=${onClose}>Cancelar</button><button class="btn btn-primary" style="flex: 2;" disabled=${!homeTeam || !awayTeam} onClick=${() => onStart({ homeTeam, awayTeam, players: selectedTeam?.players?.map(p => ({ ...p, stats: {}, onCourt: false, periodsPlayed: [], periodsRested: [], injured: false, tired: false })) || [] })}>🏀 Comezar</button></div>
          </div>
        </div>
      `;
    }

    function EditProfileModal({ user, onClose, onSave }) {
      const [name, setName] = useState(user.name);
      const [role, setRole] = useState(user.role);
      const [club, setClub] = useState(user.club || '');
      
      return html`
        <div class="modal-overlay" onClick=${e => e.target === e.currentTarget && onClose()}>
          <div class="modal">
            <div class="modal-header"><div class="modal-title">Editar Perfil</div><button class="modal-close" onClick=${onClose}>×</button></div>
            <div class="modal-body">
              <div class="form-group"><label class="form-label">Nome</label><input type="text" class="form-input" value=${name} onInput=${e => setName(e.target.value)} /></div>
              <div class="form-group"><label class="form-label">Rol</label><select class="form-select" value=${role} onChange=${e => setRole(e.target.value)}><option value="Entrenador">Entrenador</option><option value="Entrenador Axudante">Entrenador Axudante</option><option value="Delegado">Delegado</option><option value="Coordinador">Coordinador</option></select></div>
              <div class="form-group"><label class="form-label">Club</label><input type="text" class="form-input" placeholder="Nome do club" value=${club} onInput=${e => setClub(e.target.value)} /></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" style="flex: 1;" onClick=${onClose}>Cancelar</button><button class="btn btn-primary" style="flex: 2;" onClick=${() => onSave({ name, role, club })}>Gardar</button></div>
          </div>
        </div>
      `;
    }

    // MAIN APP
    function App() {
      const [state, setState] = useState(() => load() || defaultState());
      const [screen, setScreen] = useState('panel');
      const [selectedTeam, setSelectedTeam] = useState(null);
      const [modal, setModal] = useState(null);
      const [toast, setToast] = useState(null);

      useEffect(() => { save(state); }, [state]);
      const showToast = (msg) => setToast(msg);

      const addTeam = (team) => { setState(s => ({ ...s, teams: [...s.teams, { ...team, id: uid(), players: [] }] })); setModal(null); showToast('Equipo creado'); };
      
      const addPlayer = (player) => {
        const newPlayer = { ...player, id: uid() };
        setState(s => ({ ...s, teams: s.teams.map(t => t.id === selectedTeam.id ? { ...t, players: [...(t.players || []), newPlayer] } : t) }));
        setSelectedTeam(t => ({ ...t, players: [...(t.players || []), newPlayer] }));
        setModal(null);
        showToast('Xogador engadido');
      };

      const deletePlayer = (playerId) => {
        setState(s => ({ ...s, teams: s.teams.map(t => t.id === selectedTeam.id ? { ...t, players: t.players.filter(p => p.id !== playerId) } : t) }));
        setSelectedTeam(t => ({ ...t, players: t.players.filter(p => p.id !== playerId) }));
      };

      const updateTeam = (updatedTeam) => {
        setState(s => ({ ...s, teams: s.teams.map(t => t.id === updatedTeam.id ? updatedTeam : t) }));
        setSelectedTeam(updatedTeam);
      };

      const startGame = (data) => {
        const config = CONFIG[state.mode];
        const newGame = { id: uid(), mode: state.mode, homeTeam: data.homeTeam, awayTeam: data.awayTeam, homeScore: 0, awayScore: 0, period: 1, timer: config.periodTime, players: data.players, plays: [], homeTimeouts: 0, awayTimeouts: 0, startedAt: new Date().toISOString() };
        setState(s => ({ ...s, activeGame: newGame }));
        setModal(null);
        setScreen('live');
      };

      const updateGame = (game) => setState(s => ({ ...s, activeGame: game }));

      const endGame = () => {
        if (!state.activeGame) return;
        const finalGame = { ...state.activeGame, date: new Date().toLocaleDateString('gl-ES'), endedAt: new Date().toISOString() };
        setState(s => ({ ...s, games: [...s.games, finalGame], activeGame: null }));
        setScreen('analysis');
        showToast('Partido gardado');
      };

      const updateProfile = (profile) => { setState(s => ({ ...s, user: { ...s.user, ...profile } })); setModal(null); showToast('Perfil actualizado'); };

      const renderScreen = () => {
        if (screen === 'live' && state.activeGame) return html`<${LiveGameScreen} game=${state.activeGame} mode=${state.activeGame.mode} onUpdateGame=${updateGame} onEndGame=${endGame} />`;
        if (screen === 'teams' && selectedTeam) return html`<${TeamDetailScreen} team=${selectedTeam} onBack=${() => setSelectedTeam(null)} onAddPlayer=${() => setModal('newPlayer')} onDeletePlayer=${deletePlayer} onUpdateTeam=${updateTeam} />`;
        switch (screen) {
          case 'panel': return html`<${PanelScreen} state=${state} onStartGame=${() => setModal('newGame')} onModeChange=${m => setState(s => ({ ...s, mode: m }))} onContinueGame=${() => setScreen('live')} />`;
          case 'teams': return html`<${TeamsScreen} teams=${state.teams} mode=${state.mode} onAddTeam=${() => setModal('newTeam')} onSelectTeam=${setSelectedTeam} />`;
          case 'whiteboard': return html`<${WhiteboardScreen} mode=${state.mode} />`;
          case 'analysis': return html`<${AnalysisScreen} games=${state.games} teams=${state.teams} />`;
          case 'profile': return html`<${ProfileScreen} user=${state.user} games=${state.games} teams=${state.teams} onEditProfile=${() => setModal('editProfile')} />`;
        }
      };

      return html`
        <${Header} />
        ${renderScreen()}
        <${BottomNav} active=${screen === 'live' ? 'panel' : screen} onNavigate=${setScreen} hasActiveGame=${!!state.activeGame} />
        ${modal === 'newTeam' && html`<${NewTeamModal} mode=${state.mode} onClose=${() => setModal(null)} onSave=${addTeam} />`}
        ${modal === 'newPlayer' && html`<${NewPlayerModal} onClose=${() => setModal(null)} onSave=${addPlayer} />`}
        ${modal === 'newGame' && html`<${NewGameModal} mode=${state.mode} teams=${state.teams} onClose=${() => setModal(null)} onStart=${startGame} />`}
        ${modal === 'editProfile' && html`<${EditProfileModal} user=${state.user} onClose=${() => setModal(null)} onSave=${updateProfile} />`}
        ${toast && html`<${Toast} message=${toast} onClose=${() => setToast(null)} />`}
      `;
    }

    render(html`<${App} />`, document.getElementById('app'));
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
  </script>
</body>
</html>
