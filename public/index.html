<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Mini5 Stats</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mini5 Stats">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --orange:#FF6B1A;--orange-dim:#c94e00;--gold:#FFB800;
      --navy:#0A0E1A;--navy2:#121828;--navy3:#1C2437;--navy4:#252E45;
      --white:#F0F4FF;--muted:#8892AA;
      --danger:#FF3B5C;--green:#2ECC71;--amber:#FF9A3C;--blue:#5BC8FF;
      --radius:14px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);overflow-x:hidden}
    #root{min-height:100dvh;display:flex;flex-direction:column}

    /* TOPBAR */
    .topbar{background:var(--navy2);padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--orange);position:sticky;top:0;z-index:100}
    .topbar-logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;flex-shrink:0;letter-spacing:1px}
    .topbar-logo span{color:var(--orange)}
    .topbar-right{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:8px}
    .live-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:rgba(255,59,92,.15);border:1px solid rgba(255,59,92,.4);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--danger);letter-spacing:1px}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);animation:pulse 1.2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* TABS */
    .tabs{display:flex;background:var(--navy2);border-bottom:1px solid var(--navy4)}
    .tab-btn{flex:1;padding:11px 6px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent}
    .tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
    .content{flex:1;padding:14px;padding-bottom:90px;overflow-y:auto}

    /* NOTICES */
    .notice{border-radius:10px;padding:10px 13px;margin-bottom:10px;font-size:12px;font-weight:500;line-height:1.55}
    .n-blue  {background:#0a1a2a;border:1px solid #004a8a;color:var(--blue)}
    .n-green {background:#0a2a18;border:1px solid #006a30;color:var(--green)}
    .n-gold  {background:#2a1f0a;border:1px solid #6a4800;color:var(--gold)}
    .n-red   {background:#2a0a10;border:1px solid #8a0020;color:var(--danger)}

    /* SECTION */
    .sec{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .sec::after{content:'';flex:1;height:1px;background:var(--navy4)}

    /* BUTTONS */
    .btn{padding:10px 18px;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .btn-primary{background:var(--orange);color:white}
    .btn-primary:active{background:var(--orange-dim)}
    .btn-primary:disabled{opacity:.4;pointer-events:none}
    .btn-secondary{background:var(--navy3);color:var(--white);border:1px solid var(--navy4)}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--navy4)}
    .btn-green{background:var(--green);color:var(--navy);font-weight:900}
    .btn-danger-ghost{background:transparent;color:var(--danger);border:1px solid var(--danger)}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
    .btn-block{width:100%}
    .btn-mt{margin-top:8px}
    .btn-mt2{margin-top:14px}

    /* ICON BUTTONS */
    .ibtn{width:30px;height:30px;border-radius:8px;background:transparent;border:1px solid var(--navy4);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .ibtn-del{color:var(--danger);border-color:rgba(255,59,92,.3)}
    .fab{position:fixed;bottom:22px;right:18px;width:54px;height:54px;border-radius:50%;background:var(--orange);border:none;box-shadow:0 4px 18px rgba(255,107,26,.5);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;z-index:90;color:white}

    /* FORMS */
    .fgrp{margin-bottom:14px}
    .flbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
    .finp{width:100%;padding:10px 12px;background:var(--navy3);border:1px solid var(--navy4);border-radius:10px;color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;outline:none;-webkit-appearance:none}
    .finp:focus{border-color:var(--orange)}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .char-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .char-opt{padding:9px 6px;border:2px solid var(--navy4);border-radius:10px;background:var(--navy3);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-align:center;text-transform:uppercase;cursor:pointer}
    .char-opt.csel{border-color:var(--orange);color:var(--orange);background:rgba(255,107,26,.1)}

    /* MODALS */
    .overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);display:flex;align-items:flex-end}
    .sheet{background:var(--navy2);border-radius:20px 20px 0 0;border-top:2px solid var(--orange);width:100%;padding:18px 18px 36px;max-height:93dvh;overflow-y:auto;animation:slideUp .22s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .shandle{width:38px;height:4px;border-radius:2px;background:var(--navy4);margin:0 auto 18px}
    .stitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;text-transform:uppercase;margin-bottom:16px;color:var(--orange)}

    /* CENTER OVERLAY */
    .ctr-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px}
    .ctr-box{background:var(--navy2);border-radius:20px;border:1px solid var(--navy4);width:100%;max-width:340px;padding:24px 20px;text-align:center}
    .ctr-icon{font-size:40px;margin-bottom:10px}
    .ctr-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;text-transform:uppercase;margin-bottom:6px}
    .ctr-sub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
    .ctr-btns{display:flex;gap:10px}

    /* INJURY MODAL (centered) */
    .inj-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px}
    .inj-box{background:var(--navy2);border-radius:20px;width:100%;max-width:360px;overflow:hidden}
    .inj-head{background:#1a0808;border-bottom:1px solid var(--danger);padding:16px 20px;text-align:center}
    .inj-head-icon{font-size:36px;margin-bottom:6px}
    .inj-head-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;text-transform:uppercase;color:var(--danger)}
    .inj-head-sub{font-size:11px;color:var(--muted);margin-top:3px}
    .inj-body{padding:16px 20px}
    .inj-types{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .inj-type{padding:12px 8px;border-radius:12px;border:2px solid var(--navy4);cursor:pointer;text-align:center;background:var(--navy3)}
    .inj-type-icon{font-size:26px;display:block;margin-bottom:5px}
    .inj-type-lbl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;text-transform:uppercase;margin-bottom:2px}
    .inj-type-desc{font-size:10px;color:var(--muted);line-height:1.4}
    .sel-leve {border-color:var(--amber)!important;background:#2a1500!important}
    .sel-grave{border-color:var(--danger)!important;background:#2a0808!important}
    .inj-rule{background:var(--navy3);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:14px;border-left:3px solid var(--navy4)}
    .inj-rule-leve {border-left-color:var(--amber)}
    .inj-rule-grave{border-left-color:var(--danger)}
    .inj-rule strong{color:var(--white)}
    .inj-actions{display:flex;gap:10px}

    /* PLAYER CARDS (roster) */
    .pcard{background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--radius);padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
    .pcard-sel{border-color:var(--orange);background:rgba(255,107,26,.06)}
    .pdorsal{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;width:34px;text-align:center;flex-shrink:0}
    .pinfo{flex:1;min-width:0}
    .pname{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pmeta{font-size:11px;color:var(--muted);margin-top:2px}
    .pactions{display:flex;gap:5px;flex-shrink:0}

    /* TEAM CARDS */
    .tcard{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--navy3);border-radius:var(--radius);border:2px solid var(--navy4);margin-bottom:8px}
    .tcard-active{border-color:var(--orange)}
    .tball{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .tinfo{flex:1;min-width:0;cursor:pointer}
    .tname{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800}
    .tsub{font-size:11px;color:var(--muted);margin-top:2px}
    .tactions{display:flex;gap:6px;flex-shrink:0}
    .confirm-box{background:var(--navy3);border:1px solid var(--navy4);border-radius:var(--radius);padding:14px;margin-top:8px;text-align:center}
    .confirm-p{font-size:13px;color:var(--muted);margin-bottom:10px}
    .confirm-btns{display:flex;gap:8px;justify-content:center}
    .cgrid2{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:6px}
    .copt2{width:100%;aspect-ratio:1;border-radius:50%;border:3px solid transparent;cursor:pointer}
    .copt2.csel2{border-color:var(--white)}

    /* GAME HEADER */
    .game-hdr{background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--radius);padding:14px;margin-bottom:14px}
    .game-row{display:flex;align-items:center;justify-content:space-between}
    .game-team-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900}
    .game-vs{font-size:11px;color:var(--muted);text-align:center;padding:0 8px}
    .game-score{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;color:var(--orange);text-align:center;line-height:1;margin:6px 0 0}
    .game-score-lbl{font-size:10px;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:1px}
    .game-date{font-size:11px;color:var(--muted);text-align:center;margin-top:6px}

    /* SEXTO CARDS */
    .scard{background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
    .scard-cfg{border-color:var(--blue)}
    .scard-active{border-color:var(--orange)}
    .shead{padding:10px 14px;background:var(--navy3);display:flex;align-items:center;gap:8px}
    .snum{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:#fff;flex-shrink:0}
    .stitle2{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:1px;flex:1}
    .smeta{font-size:10px;color:var(--muted);margin-top:1px}
    .spartial{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--orange)}
    .spartial-zero{color:var(--muted)}
    .cfg-lbl{font-size:11px;color:var(--blue);font-weight:600}

    /* STATS TABLE HEADER */
    .stab-hrow{display:flex;align-items:center;padding:4px 14px;background:var(--navy4);gap:4px}
    .stab-hname{flex:1;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted)}
    .stab-hcell{width:28px;text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted)}
    .stab-hact{width:68px;flex-shrink:0}

    /* PLAYER STAT ROWS */
    .psrow{display:flex;align-items:center;gap:4px;padding:8px 14px;border-bottom:1px solid var(--navy4);position:relative}
    .psrow:last-of-type{border-bottom:none}
    .psrow-inj{opacity:.55;background:#1a0808}
    .psrow-grave{opacity:.4;background:#160606}
    .psdorsal{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;width:22px;flex-shrink:0;text-align:center}
    .psname{font-size:13px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pscells{display:flex;gap:4px;flex-shrink:0}
    .pscell{width:28px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;cursor:pointer;border-radius:5px;padding:3px 0}
    .pscell:active{background:var(--navy4)}
    .psacts{display:flex;gap:3px;flex-shrink:0;margin-left:2px}
    .psact-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--navy4);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
    .psact-inj{border-color:rgba(255,154,60,.4);color:var(--amber)}
    .psact-sub{border-color:rgba(91,200,255,.4);color:var(--blue)}
    .psact-del{border-color:rgba(255,59,92,.3);color:var(--danger)}

    /* INJURY BADGE */
    .inj-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-left:4px}
    .ib-leve {background:#2a1500;color:var(--amber);border:1px solid var(--amber)}
    .ib-grave{background:#2a0a10;color:var(--danger);border:1px solid var(--danger)}

    /* SUB BADGE */
    .sub-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-left:4px;background:#0a1a2a;color:var(--blue);border:1px solid var(--blue)}

    /* COUNTER */
    .counter{display:flex;align-items:center;gap:8px}
    .cnt-btn{width:38px;height:38px;border-radius:9px;background:var(--navy4);border:1px solid var(--navy3);color:var(--white);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:300;line-height:1}
    .cnt-btn:active{background:var(--navy3)}
    .cnt-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;min-width:36px;text-align:center}

    /* STATS MODAL HEAD */
    .smod-head{display:flex;align-items:center;gap:12px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--navy4)}
    .smod-dorsal{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;width:44px;height:44px;border-radius:10px;background:var(--navy4);border:2px solid var(--navy3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .smod-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900}
    .smod-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .ctr-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--navy4)}
    .ctr-row:last-of-type{border-bottom:none}
    .ctr-lbl{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .ctr-lbl-badge{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-left:6px}

    /* SUMMARY */
    .sum-big{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;color:var(--orange);text-align:center;line-height:1}
    .sum-big-sub{font-size:11px;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .sum-vs{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-align:center;margin-bottom:4px}
    .sum-date{font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px}
    .partials{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 14px}
    .partial-chip{background:var(--navy4);border-radius:8px;padding:6px 10px;text-align:center;min-width:46px}
    .pc-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700}
    .pc-val{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:var(--orange);line-height:1;margin-top:2px}
    .sum-table{width:100%;border-collapse:collapse;margin-bottom:14px}
    .sum-th{padding:5px 3px;text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--navy4)}
    .sum-th-l{text-align:left}
    .sum-td{padding:7px 3px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;border-bottom:1px solid var(--navy4)}
    .sum-td-l{text-align:left;font-size:12px;font-family:'Barlow',sans-serif;font-weight:500}
    .c-pts {color:var(--orange)}
    .c-miss{color:var(--danger)}
    .c-reb {color:var(--blue)}
    .c-stl {color:var(--green)}
    .c-foul{color:var(--amber)}

    /* HISTORY */
    .hcard{background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer}
    .hcard:active{border-color:var(--orange)}
    .hcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
    .hcard-team{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900}
    .hcard-rival{font-size:12px;color:var(--muted);margin-top:1px}
    .hcard-score{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--orange);line-height:1;text-align:right}
    .hcard-rival-score{font-size:11px;color:var(--muted);text-align:right}
    .hcard-date{font-size:11px;color:var(--muted);margin-bottom:8px}
    .hcard-chips{display:flex;gap:8px;flex-wrap:wrap}
    .hchip{font-size:11px;color:var(--muted)}
    .hchip b{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:var(--white)}

    /* EMPTY */
    .empty-state{text-align:center;padding:44px 20px;color:var(--muted)}
    .empty-icon{font-size:52px;display:block;margin-bottom:14px}
    .empty-title{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:800;text-transform:uppercase;margin-bottom:7px;color:var(--white)}
    .empty-p{font-size:13px}

    /* STAT BOXES */
    .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
    .stat-box{background:var(--navy3);border-radius:10px;border:1px solid var(--navy4);padding:11px 8px;text-align:center}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:var(--orange);line-height:1}
    .stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

    /* BAR */
    .barwrap{background:var(--navy4);border-radius:4px;height:5px;overflow:hidden;margin-top:4px}
    .barfill{height:100%;border-radius:4px}

    /* MONTHS */
    .MONTHS{display:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import{createElement as h,useState,useEffect,useCallback,useMemo,Fragment}from'https://esm.sh/react@18.2.0';
import{createRoot}from'https://esm.sh/react-dom@18.2.0/client';
import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);

/* в”Ђв”Ђв”Ђ CONSTANTS в”Ђв”Ђв”Ђ */
const CHARS=['Velocidad','Buen Defensor','Alto','Anotador','Polivalente','Normal'];
const TCOLORS=['#FF6B1A','#3498DB','#2ECC71','#9B59B6','#E74C3C','#FFB800','#1ABC9C','#E91E63','#00BCD4','#8BC34A','#FF5722','#607D8B'];
const STORE_KEY='mini5_stats_v2';
const MONTHS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const STATS=[
  {key:'pts', label:'Puntos',        short:'PTS',clsn:'c-pts'},
  {key:'miss',label:'Tiros Fallados',short:'TF', clsn:'c-miss'},
  {key:'reb', label:'Rebotes',       short:'REB',clsn:'c-reb'},
  {key:'stl', label:'Robos',         short:'ROB',clsn:'c-stl'},
  {key:'foul',label:'Faltas',        short:'FAL',clsn:'c-foul'},
];
const STAT_COLORS={pts:'var(--orange)',miss:'var(--danger)',reb:'var(--blue)',stl:'var(--green)',foul:'var(--amber)'};
const emptyStats=()=>({pts:0,miss:0,reb:0,stl:0,foul:0});

/* в”Ђв”Ђв”Ђ STORAGE в”Ђв”Ђв”Ђ */
function loadState(){try{const d=localStorage.getItem(STORE_KEY);if(d)return JSON.parse(d);}catch(e){}return null;}
function saveState(s){try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch(e){}}
function defaultState(){
  const id=crypto.randomUUID();
  return{activeTeamId:id,teams:[{id,name:'Mi Equipo',color:'#FF6B1A',players:[]}],activeGame:null,games:[]};
}

/* в”Ђв”Ђв”Ђ DATA HELPERS в”Ђв”Ђв”Ђ */
const sextoTotal=s=>s.entries.reduce((sum,e)=>(e.injury!=='grave_start'?sum+(e.stats.pts||0):sum),0);
const gameTotal=g=>g.sextosData.reduce((a,s)=>a+sextoTotal(s),0);

function playerTotals(game){
  const map={};
  game.sextosData.forEach(s=>{
    s.entries.forEach(e=>{
      if(e.injury==='grave_start')return;
      const k=e.playerId;
      if(!map[k])map[k]={name:e.name,dorsal:e.dorsal,...emptyStats(),sextosPlayed:0};
      STATS.forEach(st=>{map[k][st.key]+=(e.stats[st.key]||0);});
      map[k].sextosPlayed++;
    });
  });
  return Object.values(map).sort((a,b)=>b.pts-a.pts);
}

function formatDate(iso){const d=new Date(iso);return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();}
function formatTime(iso){const d=new Date(iso);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

/* в”Ђв”Ђв”Ђ NEW GAME FACTORY в”Ђв”Ђв”Ђ */
function createGame(team,opponent){
  return{
    id:crypto.randomUUID(),date:new Date().toISOString(),status:'active',
    teamId:team.id,teamName:team.name,teamColor:team.color,
    opponent:opponent.trim(),opponentScore:0,
    // sextosData: array of 6, each has { lineup:[playerIds], entries:[{playerId,name,dorsal,injury,subFor,stats}] }
    sextosData:Array(6).fill(null).map(()=>({lineup:[],entries:[]})),
  };
}

/* в”Ђв”Ђв”Ђ SMALL UI в”Ђв”Ђв”Ђ */
function Counter({value,onChange,color}){
  return html`
    <div class="counter">
      <button class="cnt-btn" onClick=${()=>onChange(Math.max(0,value-1))}>в€’</button>
      <span class="cnt-val" style=${{color:color||'var(--white)'}}>${value}</span>
      <button class="cnt-btn" onClick=${()=>onChange(value+1)}>+</button>
    </div>`;
}

/* в”Ђв”Ђв”Ђ SELECT LINEUP MODAL (5 players for a sexto) в”Ђв”Ђв”Ђ */
function SelectLineupModal({sextoNum,teamPlayers,currentLineup,teamColor,onSave,onClose}){
  const[sel,setSel]=useState(new Set(currentLineup||[]));
  const toggle=id=>{
    const next=new Set(sel);
    if(next.has(id))next.delete(id);
    else if(next.size<5)next.add(id);
    setSel(next);
  };
  return html`
    <div class="overlay" onClick=${e=>e.target===e.currentTarget&&onClose()}>
      <div class="sheet">
        <div class="shandle"></div>
        <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div class="stitle" style=${{marginBottom:0}}>Quinteto вЂ” Sexto ${sextoNum}</div>
          <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:800,color:sel.size===5?'var(--green)':'var(--muted)'}}>${sel.size}/5</span>
        </div>
        <div class="notice n-blue" style=${{marginBottom:12}}>Selecciona exactamente 5 jugadores para este sexto.</div>
        ${teamPlayers.length===0&&html`
          <div class="empty-state" style=${{padding:'20px 0'}}>
            <span class="empty-icon">рџ‘Ґ</span>
            <div class="empty-title">Sin jugadores</div>
            <p class="empty-p">AГ±ade jugadores al equipo en la pestaГ±a Equipos.</p>
          </div>
        `}
        ${teamPlayers.map(p=>html`
          <div key=${p.id} class=${'pcard'+(sel.has(p.id)?' pcard-sel':'')} onClick=${()=>toggle(p.id)} style=${{cursor:'pointer',marginBottom:8}}>
            <div class="pdorsal" style=${{color:sel.has(p.id)?teamColor:'var(--muted)'}}>${p.dorsal}</div>
            <div class="pinfo"><div class="pname">${p.name}</div><div class="pmeta">${p.license?'Lic: '+p.license:''}</div></div>
            <span style=${{fontSize:18,color:sel.has(p.id)?'var(--green)':'var(--navy4)',transition:'color .15s'}}>${sel.has(p.id)?'вњ“':'в—‹'}</span>
          </div>
        `)}
        <button class="btn btn-primary btn-block" style=${{marginTop:14}} disabled=${sel.size!==5} onClick=${()=>onSave([...sel])}>
          вњ… Confirmar Quinteto
        </button>
        <button class="btn btn-ghost btn-block btn-mt" onClick=${onClose}>Cancelar</button>
      </div>
    </div>`;
}

/* в”Ђв”Ђв”Ђ SUBSTITUTION MODAL в”Ђв”Ђв”Ђ */
function SubModal({entry,sextoNum,teamPlayers,usedIds,teamColor,onConfirm,onClose}){
  // Bench = team players not already in this sexto (except the one being subbed)
  const bench=teamPlayers.filter(p=>!usedIds.has(p.id)||p.id===entry.playerId);
  const available=bench.filter(p=>p.id!==entry.playerId);
  return html`
    <div class="overlay" onClick=${e=>e.target===e.currentTarget&&onClose()}>
      <div class="sheet">
        <div class="shandle"></div>
        <div class="stitle">Sustituir #${entry.dorsal} ${entry.name}</div>
        <div class="notice n-blue" style=${{marginBottom:12}}>Elige el jugador que entra al Sexto ${sextoNum}.</div>
        ${available.length===0&&html`
          <div class="notice n-gold">No hay jugadores disponibles en el banquillo para este sexto.</div>
        `}
        ${available.map(p=>html`
          <div key=${p.id} class="pcard" style=${{cursor:'pointer',marginBottom:8}} onClick=${()=>onConfirm(p)}>
            <div class="pdorsal" style=${{color:teamColor}}>${p.dorsal}</div>
            <div class="pinfo"><div class="pname">${p.name}</div><div class="pmeta">${p.license?'Lic: '+p.license:''}</div></div>
            <span style=${{color:'var(--green)',fontSize:22}}>в†’</span>
          </div>
        `)}
        <button class="btn btn-ghost btn-block btn-mt" onClick=${onClose}>Cancelar</button>
      </div>
    </div>`;
}

  const[delPlayer,setDelPlayer]=useState(null);

  const savePlayer=p=>{
    onUpdateTeams(teams.map(t=>t.id===expanded?{...t,players:editP?t.players.map(x=>x.id===p.id?p:x):[...t.players,p]}:t));
    setEditP(null);
  };
  const removePlayer=pid=>{onUpdateTeams(teams.map(t=>t.id===expanded?{...t,players:t.players.filter(x=>x.id!==pid)}:t));setDelPlayer(null);};
  const saveTeam=t=>{
    const ex=teams.find(x=>x.id===t.id);
    if(ex)onUpdateTeams(teams.map(x=>x.id===t.id?{...x,name:t.name,color:t.color}:x));
    else onUpdateTeams([...teams,t]);
    setEditT(null);
  };
  const removeTeam=id=>{
    const rest=teams.filter(t=>t.id!==id);
    onUpdateTeams(rest);
    if(expanded===id)setExpanded(rest[0]?.id||null);
    setDelTeam(null);
  };

  return html`
    <${Fragment}>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val">${teams.length}</div><div class="stat-lbl">Equipos</div></div>
        <div class="stat-box"><div class="stat-val">${teams.reduce((a,t)=>a+t.players.length,0)}</div><div class="stat-lbl">Jugadores</div></div>
        <div class="stat-box"><div class="stat-val">${teams.find(t=>t.id===expanded)?.players.length||0}</div><div class="stat-lbl">Activo</div></div>
      </div>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div class="sec" style=${{marginBottom:0,flex:1}}>Equipos</div>
        <button class="btn btn-secondary btn-sm" onClick=${()=>{setEditT(null);setShowTF(true);}}>+ Equipo</button>
      </div>
      ${teams.map(t=>html`
        <div key=${t.id}>
          <div class=${'tcard'+(t.id===expanded?' tcard-active':'')}>
            <div class="tball" style=${{background:t.color+'22',color:t.color}} onClick=${()=>setExpanded(t.id===expanded?null:t.id)}>рџЏЂ</div>
            <div class="tinfo" onClick=${()=>setExpanded(t.id===expanded?null:t.id)}>
              <div class="tname">${t.name}</div>
              <div class="tsub">${t.players.length} jugadores В· pulsa para ${t.id===expanded?'cerrar':'ver'}</div>
            </div>
            <div class="tactions">
              <button class="ibtn" onClick=${e=>{e.stopPropagation();setEditT(t);setShowTF(true);}}>вњЏпёЏ</button>
              ${teams.length>1&&html`<button class="ibtn ibtn-del" onClick=${e=>{e.stopPropagation();setDelTeam(t.id);}}>рџ—‘пёЏ</button>`}
            </div>
            <span style=${{color:'var(--muted)',fontSize:11,flexShrink:0}}>${t.id===expanded?'в–І':'в–ј'}</span>
          </div>
          ${delTeam===t.id&&html`
            <div class="confirm-box">
              <p class="confirm-p">ВїEliminar "${t.name}" y todos sus jugadores?</p>
              <div class="confirm-btns">
                <button class="btn btn-sm btn-secondary" onClick=${()=>setDelTeam(null)}>Cancelar</button>
                <button class="btn btn-sm btn-danger-ghost" onClick=${()=>removeTeam(t.id)}>Eliminar</button>
              </div>
            </div>
          `}
          ${t.id===expanded&&html`
            <div style=${{background:'var(--navy2)',border:'1px solid var(--navy3)',borderTop:'none',borderRadius:'0 0 var(--radius) var(--radius)',paddingBottom:4,marginBottom:8}}>
              ${t.players.length===0&&html`<div style=${{textAlign:'center',padding:'16px',color:'var(--muted)',fontSize:13}}>Sin jugadores В· pulsa + para aГ±adir</div>`}
              ${t.players.map(p=>html`
                <div key=${p.id} style=${{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',borderBottom:'1px solid var(--navy4)'}}>
                  <div style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,width:30,textAlign:'center',color:t.color}}>${p.dorsal}</div>
                  <div style=${{flex:1,minWidth:0,fontSize:14,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>${p.name}</div>
                  <div style=${{display:'flex',gap:4}}>
                    <button class="ibtn" onClick=${()=>{setEditP(p);setShowPF(true);}}>вњЏпёЏ</button>
                    ${delPlayer===p.id
                      ?html`<div style=${{display:'flex',gap:3}}>
                          <button class="ibtn" style=${{color:'var(--danger)'}} onClick=${()=>removePlayer(p.id)}>вњ“</button>
                          <button class="ibtn" onClick=${()=>setDelPlayer(null)}>вњ•</button>
                        </div>`
                      :html`<button class="ibtn ibtn-del" onClick=${()=>setDelPlayer(p.id)}>рџ—‘пёЏ</button>`
                    }
                  </div>
                </div>
              `)}
              <div style=${{display:'flex',alignItems:'center',gap:6,padding:'9px 14px',fontSize:12,color:'var(--orange)',cursor:'pointer',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px'}}
                onClick=${()=>{setEditP(null);setShowPF(true);}}>+ AГ±adir jugador</div>
            </div>
          `}
        </div>
      `)}
      ${teams.length===0&&html`
        <div class="empty-state">
          <span class="empty-icon">рџ‘•</span>
          <div class="empty-title">Sin equipos</div>
          <p class="empty-p">Pulsa В«+ EquipoВ» para crear uno</p>
        </div>
      `}
      ${showPF&&html`<${PlayerForm} editing=${editP} onClose=${()=>{setShowPF(false);setEditP(null);}} onSave=${savePlayer} />`}
      ${showTF&&html`<${TeamForm}   editing=${editT} onClose=${()=>{setShowTF(false);setEditT(null);}} onSave=${saveTeam} />`}
    <//>`;
}

/* в”Ђв”Ђв”Ђ PARTIDO TAB в”Ђв”Ђв”Ђ */
function PartidoTab({activeGame,teams,onNewGame,onUpdateGame,onFinalizeGame}){
  const[showNew,setShowNew]=useState(false);
  const[editLineup,setEditLineup]=useState(null);  // sextoIndex
  const[editStats,setEditStats]=useState(null);    // {si, ei, entry}
  const[editInj,setEditInj]=useState(null);        // {si, ei, entry}
  const[editSub,setEditSub]=useState(null);        // {si, ei, entry}
  const[showSummary,setShowSummary]=useState(false);
  const[confirmEnd,setConfirmEnd]=useState(false);

  const upd=useCallback(g=>onUpdateGame(g),[onUpdateGame]);

  // в”Ђ update a sexto in place
  const updSexto=(si,fn)=>{
    const sd=[...activeGame.sextosData];
    sd[si]=fn(sd[si]);
    upd({...activeGame,sextosData:sd});
  };

  // в”Ђ SET LINEUP for a sexto
  const setLineup=(si,playerIds)=>{
    const team=teams.find(t=>t.id===activeGame.teamId);
    if(!team)return;
    const entries=playerIds.map(pid=>{
      const p=team.players.find(x=>x.id===pid);
      // keep existing stats if player was already in lineup
      const existing=activeGame.sextosData[si].entries.find(e=>e.playerId===pid&&!e.subFor);
      return existing||{playerId:pid,name:p.name,dorsal:p.dorsal,injury:null,subFor:null,stats:{...emptyStats()}};
    });
    updSexto(si,s=>({...s,lineup:playerIds,entries}));
  };

  // в”Ђ SAVE STATS
  const saveStats=(si,ei,stats)=>{
    updSexto(si,s=>{const e=[...s.entries];e[ei]={...e[ei],stats};return{...s,entries:e};});
    setEditStats(null);
  };

  // в”Ђ MARK INJURY
  const markInjury=(si,ei,type)=>{
    updSexto(si,s=>{const e=[...s.entries];e[ei]={...e[ei],injury:type};return{...s,entries:e};});
    setEditInj(null);
  };
  const clearInjury=(si,ei)=>{
    updSexto(si,s=>{const e=[...s.entries];e[ei]={...e[ei],injury:null};return{...s,entries:e};});
  };

  // в”Ђ SUBSTITUTION
  const doSub=(si,ei,newPlayer)=>{
    updSexto(si,s=>{
      const e=[...s.entries];
      // Mark original as subbed
      const orig=e[ei];
      e[ei]={...orig,injury:'subbed'};
      // Add new player entry
      const existing=s.entries.find(x=>x.playerId===newPlayer.id);
      if(!existing){
        e.push({playerId:newPlayer.id,name:newPlayer.name,dorsal:newPlayer.dorsal,injury:null,subFor:orig.playerId,stats:{...emptyStats()}});
      }
      return{...s,entries:e};
    });
    setEditSub(null);
  };

  if(!activeGame){
    return html`
      <${Fragment}>
        ${teams.length===0&&html`<div class="notice n-gold">вљ пёЏ Crea primero un equipo en В«EquiposВ».</div>`}
        ${teams.length>0&&html`
          <div class="empty-state">
            <span class="empty-icon">рџЏЂ</span>
            <div class="empty-title">Sin partido activo</div>
            <p class="empty-p">Inicia un partido para registrar estadГ­sticas</p>
          </div>
          <button class="btn btn-primary btn-block" style=${{marginTop:16}} onClick=${()=>setShowNew(true)}>рџЏЂ Nuevo Partido</button>
        `}
        ${showNew&&html`<${NewGameModal} teams=${teams} onStart=${g=>{onNewGame(g);}} onClose=${()=>setShowNew(false)} />`}
      <//>`;
  }

  const team=teams.find(t=>t.id===activeGame.teamId);
  const totalPts=gameTotal(activeGame);

  return html`
    <${Fragment}>
      <div class="game-hdr">
        <div class="game-row">
          <div class="game-team-name" style=${{color:activeGame.teamColor}}>${activeGame.teamName}</div>
          <div class="game-vs">vs</div>
          <div class="game-team-name">${activeGame.opponent}</div>
        </div>
        <div class="game-score">${totalPts}</div>
        <div class="game-score-lbl">Puntos totales</div>
        <div class="game-date">${formatDate(activeGame.date)} В· ${formatTime(activeGame.date)}h</div>
      </div>

      ${activeGame.sextosData.map((sd,si)=>{
        const partial=sextoTotal(sd);
        const hasLineup=sd.lineup.length===5;
        const usedIds=new Set(sd.entries.map(e=>e.playerId));
        const cardCls='scard'+(hasLineup?'':' scard-cfg');

        return html`
          <div key=${si} class=${hasLineup?'scard scard-active':'scard scard-cfg'}>
            <div class="shead">
              <div class="snum" style=${{background:activeGame.teamColor}}>${si+1}</div>
              <div style=${{flex:1,minWidth:0}}>
                <div class="stitle2">Sexto ${si+1}</div>
                <div class="smeta">${hasLineup?sd.entries.length+' jugadores asignados':'Sin quinteto configurado'}</div>
              </div>
              ${hasLineup
                ?html`<div class=${'spartial'+(partial===0?' spartial-zero':'')}>${partial} pts</div>`
                :html`<div class="cfg-lbl">вљ™пёЏ Configurar</div>`
              }
              <button class="ibtn" style=${{marginLeft:6}} title="Configurar quinteto" onClick=${()=>setEditLineup(si)}>
                ${hasLineup?'вњЏпёЏ':'вћ•'}
              </button>
            </div>

            ${!hasLineup&&html`
              <div class="notice n-blue" style=${{margin:'10px 14px',fontSize:11}}>
                Pulsa вћ• para asignar los 5 jugadores de este sexto.
              </div>
            `}

            ${hasLineup&&html`
              <div class="stab-hrow">
                <div style=${{width:22,flexShrink:0}}></div>
                <div class="stab-hname">Jugador</div>
                ${STATS.map(s=>html`<div key=${s.key} class="stab-hcell" style=${{color:STAT_COLORS[s.key]}}>${s.short}</div>`)}
                <div class="stab-hact"></div>
              </div>
              ${sd.entries.map((entry,ei)=>{
                const isLeve=entry.injury==='leve';
                const isGrave=entry.injury==='grave';
                const isSubbed=entry.injury==='subbed';
                const isSub=!!entry.subFor;
                const rowCls='psrow'+(isLeve||isSubbed?' psrow-inj':'')+(isGrave?' psrow-grave':'');
                return html`
                  <div key=${ei} class=${rowCls}>
                    <div class="psdorsal" style=${{color:isGrave||isSubbed?'var(--danger)':activeGame.teamColor}}>${entry.dorsal}</div>
                    <div class="psname">
                      ${entry.name}
                      ${isSub&&html`<span class="sub-badge">рџ”„ entra</span>`}
                      ${isLeve&&html`<span class="inj-badge ib-leve">рџ¤• leve</span>`}
                      ${isGrave&&html`<span class="inj-badge ib-grave">рџљ‘ grave</span>`}
                      ${isSubbed&&html`<span class="inj-badge" style=${{background:'#1a1a2a',color:'var(--muted)',border:'1px solid var(--navy4)'}}>в†” sale</span>`}
                    </div>
                    <div class="pscells">
                      ${STATS.map(s=>html`
                        <div key=${s.key} class="pscell" style=${{color:STAT_COLORS[s.key]}}
                          onClick=${()=>!isGrave&&!isSubbed&&setEditStats({si,ei,entry})}>
                          ${entry.stats[s.key]||0}
                        </div>
                      `)}
                    </div>
                    <div class="psacts">
                      ${!isGrave&&!isSubbed&&html`
                        <button class="psact-btn psact-inj" title="Registrar lesiГіn"
                          onClick=${()=>setEditInj({si,ei,entry})}>рџ¤•</button>
                        <button class="psact-btn psact-sub" title="Sustituir jugador"
                          onClick=${()=>setEditSub({si,ei,entry})}>рџ”„</button>
                      `}
                      ${(isLeve||isGrave)&&html`
                        <button class="psact-btn" style=${{color:'var(--muted)',fontSize:10}} title="Quitar lesiГіn"
                          onClick=${()=>clearInjury(si,ei)}>в†©</button>
                      `}
                    </div>
                  </div>`;
              })}
            `}
          </div>`;
      })}

      <button class="btn btn-green btn-block" onClick=${()=>setConfirmEnd(true)}>рџЏЃ Finalizar Partido</button>

      ${editLineup!==null&&html`
        <${SelectLineupModal}
          sextoNum=${editLineup+1}
          teamPlayers=${team?.players||[]}
          currentLineup=${activeGame.sextosData[editLineup].lineup}
          teamColor=${activeGame.teamColor}
          onSave=${ids=>{setLineup(editLineup,ids);setEditLineup(null);}}
          onClose=${()=>setEditLineup(null)} />
      `}

      ${editStats&&html`
        <${StatsModal}
          entry=${editStats.entry}
          sextoNum=${editStats.si+1}
          teamColor=${activeGame.teamColor}
          onSave=${stats=>{saveStats(editStats.si,editStats.ei,stats);}}
          onClose=${()=>setEditStats(null)} />
      `}

      ${editInj&&html`
        <${InjuryModal}
          entry=${editInj.entry}
          sextoNum=${editInj.si+1}
          onConfirm=${type=>{markInjury(editInj.si,editInj.ei,type);}}
          onCancel=${()=>setEditInj(null)} />
      `}

      ${editSub&&html`
        <${SubModal}
          entry=${editSub.entry}
          sextoNum=${editSub.si+1}
          teamPlayers=${team?.players||[]}
          usedIds=${new Set(activeGame.sextosData[editSub.si].entries.map(e=>e.playerId))}
          teamColor=${activeGame.teamColor}
          onConfirm=${p=>{doSub(editSub.si,editSub.ei,p);}}
          onClose=${()=>setEditSub(null)} />
      `}

      ${confirmEnd&&html`
        <div class="ctr-overlay" onClick=${e=>e.target===e.currentTarget&&setConfirmEnd(false)}>
          <div class="ctr-box">
            <div class="ctr-icon">рџЏЃ</div>
            <div class="ctr-title">Finalizar Partido</div>
            <div class="ctr-sub">
              ${activeGame.teamName} vs ${activeGame.opponent}<br/>
              <strong style=${{color:'var(--orange)',fontSize:18}}>${gameTotal(activeGame)} pts</strong><br/>
              ВїVer resumen y guardar en historial?
            </div>
            <div class="ctr-btns">
              <button class="btn btn-ghost" style=${{flex:1}} onClick=${()=>setConfirmEnd(false)}>Volver</button>
              <button class="btn btn-primary" style=${{flex:1.5}} onClick=${()=>{setConfirmEnd(false);setShowSummary(true);}}>Ver resumen</button>
            </div>
          </div>
        </div>
      `}

      ${showSummary&&html`
        <${SummaryModal}
          game=${activeGame}
          onSave=${g=>{onFinalizeGame(g);setShowSummary(false);}}
          onBack=${()=>setShowSummary(false)} />
      `}
    <//>`;
}

/* в”Ђв”Ђв”Ђ HISTORIAL TAB в”Ђв”Ђв”Ђ */
function HistorialTab({games,onDeleteGame}){
  const[selected,setSelected]=useState(null);
  const sorted=[...games].sort((a,b)=>new Date(b.date)-new Date(a.date));

  if(sorted.length===0)return html`
    <div class="empty-state">
      <span class="empty-icon">рџ“љ</span>
      <div class="empty-title">Sin historial</div>
      <p class="empty-p">Los partidos finalizados aparecerГЎn aquГ­</p>
    </div>`;

  return html`
    <${Fragment}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div class="sec" style=${{marginBottom:0,flex:1}}>Historial</div>
        <span style=${{fontSize:12,color:'var(--muted)'}}>${sorted.length} partido${sorted.length!==1?'s':''}</span>
      </div>
      ${sorted.map(g=>{
        const total=gameTotal(g);
        const totals=playerTotals(g);
        const top=totals[0];
        const totalReb=totals.reduce((a,p)=>a+p.reb,0);
        const totalStl=totals.reduce((a,p)=>a+p.stl,0);
        const totalFoul=totals.reduce((a,p)=>a+p.foul,0);
        return html`
          <div key=${g.id} class="hcard" onClick=${()=>setSelected(g)}>
            <div class="hcard-top">
              <div>
                <div class="hcard-team">${g.teamName}</div>
                <div class="hcard-rival">vs ${g.opponent}</div>
              </div>
              <div>
                <div class="hcard-score">${total} pts</div>
                ${g.opponentScore>0&&html`<div class="hcard-rival-score">rival: ${g.opponentScore}</div>`}
              </div>
            </div>
            <div class="hcard-date">${formatDate(g.date)} В· ${formatTime(g.date)}h</div>
            <div class="hcard-chips">
              ${top&&html`<div class="hchip">рџЏ† <b>#${top.dorsal} ${top.name}</b> ${top.pts}pts</div>`}
              <div class="hchip">рџ”„ <b>${totalReb}</b> reb</div>
              <div class="hchip">рџ¤љ <b>${totalStl}</b> rob</div>
              <div class="hchip">в›” <b>${totalFoul}</b> fal</div>
            </div>
          </div>`;
      })}
      ${selected&&html`
        <${DetailModal} game=${selected} onClose=${()=>setSelected(null)} onDelete=${id=>{onDeleteGame(id);setSelected(null);}} />
      `}
    <//>`;
}

/* в”Ђв”Ђв”Ђ APP в”Ђв”Ђв”Ђ */
function App(){
  const[state,setState]=useState(()=>loadState()||defaultState());
  const[tab,setTab]=useState('partido');
  useEffect(()=>saveState(state),[state]);

  const updTeams=teams=>setState(s=>({...s,teams}));
  const updGame=g=>setState(s=>({...s,activeGame:g}));
  const newGame=g=>setState(s=>({...s,activeGame:g}));
  const finalizeGame=g=>setState(s=>({...s,activeGame:null,games:[...s.games,g]}));
  const delGame=id=>setState(s=>({...s,games:s.games.filter(g=>g.id!==id)}));

  const TABS=[
    {id:'equipos', label:'рџ‘• Equipos'},
    {id:'partido', label:'рџЏЂ Partido'},
    {id:'historial',label:'рџ“љ Historial'},
  ];

  return html`
    <${Fragment}>
      <div class="topbar">
        <div class="topbar-logo"><span>MINI5</span> STATS</div>
        <div class="topbar-right">
          ${state.activeGame&&html`
            <div class="live-pill"><div class="live-dot"></div>EN JUEGO</div>
          `}
        </div>
      </div>
      <div class="tabs">${TABS.map(t=>html`<button key=${t.id} class=${'tab-btn'+(tab===t.id?' active':'')} onClick=${()=>setTab(t.id)}>${t.label}</button>`)}</div>
      <div class="content">
        ${tab==='equipos'  &&html`<${TeamsTab}    teams=${state.teams} onUpdateTeams=${updTeams} />`}
        ${tab==='partido'  &&html`<${PartidoTab}  activeGame=${state.activeGame} teams=${state.teams} onNewGame=${newGame} onUpdateGame=${updGame} onFinalizeGame=${finalizeGame} />`}
        ${tab==='historial'&&html`<${HistorialTab} games=${state.games} onDeleteGame=${delGame} />`}
      </div>
    <//>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
