<!DOCTYPE html>
<html lang="gl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Stats+ Mini</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --orange: #FF6B1A;
      --orange-dim: #c94e00;
      --orange-glow: rgba(255,107,26,0.3);
      --bg-dark: #0A0E1A;
      --bg-card: #12172A;
      --bg-card2: #1A2035;
      --bg-card3: #242B42;
      --border: #2A3350;
      --white: #F0F4FF;
      --muted: #7A8599;
      --danger: #FF3B5C;
      --success: #2ECC71;
      --warning: #FF9A3C;
      --info: #5BC8FF;
      --purple: #9B59B6;
      --radius: 16px;
      --radius-sm: 10px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg-dark); color: var(--white); overflow-x: hidden; }
    #app { min-height: 100dvh; display: flex; flex-direction: column; }
    
    .header {
      background: var(--bg-card); padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid var(--orange); position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--orange), var(--orange-dim)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; font-style: italic; }
    .logo-text span { color: var(--orange); }
    
    .main { flex: 1; padding: 14px; padding-bottom: 85px; overflow-y: auto; }
    
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 6px 0 max(6px, env(safe-area-inset-bottom)); z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; border-radius: 10px; cursor: pointer; color: var(--muted); background: transparent; border: none; font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 600; text-transform: uppercase; }
    .nav-item.active { color: var(--orange); }
    .nav-item .icon { font-size: 18px; }
    
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
    .card-orange { background: linear-gradient(135deg, var(--orange), var(--orange-dim)); border: none; cursor: pointer; }
    
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    .section-link { color: var(--orange); font-size: 12px; font-weight: 600; cursor: pointer; }
    
    .mode-toggle { display: flex; background: var(--bg-card2); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 14px; }
    .mode-btn { flex: 1; padding: 8px 10px; border: none; border-radius: 7px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; background: transparent; color: var(--muted); }
    .mode-btn.active { background: var(--orange); color: white; }
    
    .info-box { background: rgba(91,200,255,0.1); border: 1px solid var(--info); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 14px; font-size: 11px; color: var(--info); line-height: 1.4; }
    .info-box strong { color: var(--white); }
    .warning-box { background: rgba(255,154,60,0.1); border: 1px solid var(--warning); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 14px; font-size: 11px; color: var(--warning); }
    
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat-card { background: var(--bg-card2); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
    .stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: var(--orange); }
    
    .cta-card { display: flex; align-items: center; gap: 12px; padding: 16px; }
    .cta-icon { width: 44px; height: 44px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .cta-content { flex: 1; }
    .cta-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; text-transform: uppercase; }
    .cta-sub { font-size: 12px; opacity: 0.9; margin-top: 2px; }
    .cta-arrow { font-size: 24px; opacity: 0.8; }
    
    .team-list { display: flex; flex-direction: column; gap: 8px; }
    .team-card { background: var(--bg-card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .team-card:hover { border-color: var(--orange); }
    .team-logo { width: 44px; height: 44px; background: var(--bg-card3); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .team-info { flex: 1; }
    .team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; }
    .team-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .team-badge { padding: 4px 8px; background: var(--bg-card3); border-radius: 5px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .team-badge.minibasket { color: var(--info); }
    .team-badge.preminibasket { color: var(--success); }
    .team-badge.fiba { color: var(--orange); }
    
    .player-list { display: flex; flex-direction: column; gap: 6px; }
    .player-item { background: var(--bg-card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
    .player-number { width: 32px; height: 32px; background: var(--orange); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; }
    .player-info { flex: 1; }
    .player-name { font-weight: 600; font-size: 14px; }
    .player-position { font-size: 11px; color: var(--muted); }
    .player-action-btn { width: 28px; height: 28px; background: var(--bg-card3); border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 12px; }
    .player-action-btn:hover { color: var(--white); border-color: var(--orange); }
    .player-action-btn.delete:hover { color: var(--danger); border-color: var(--danger); }
    
    /* LIVE GAME */
    .live-header { background: var(--bg-card); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); }
    .live-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,59,92,0.15); border: 1px solid rgba(255,59,92,0.4); padding: 3px 10px; border-radius: 15px; font-size: 10px; font-weight: 700; color: var(--danger); text-transform: uppercase; margin-bottom: 10px; }
    .live-dot { width: 6px; height: 6px; background: var(--danger); border-radius: 50%; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .live-scoreboard { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .live-team { text-align: center; flex: 1; }
    .live-team-logo { width: 48px; height: 48px; background: var(--bg-card2); border: 2px solid var(--border); border-radius: 50%; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 12px; }
    .live-team-logo.home { border-color: var(--success); color: var(--success); }
    .live-team-logo.away { border-color: var(--orange); color: var(--orange); }
    .live-team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .live-center { text-align: center; }
    .live-score { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .live-score span { color: var(--muted); font-size: 28px; }
    .live-timer { background: var(--bg-card2); padding: 6px 16px; border-radius: 8px; margin-top: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; color: var(--orange); display: inline-block; cursor: pointer; }
    .live-period { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .live-timeouts { display: flex; justify-content: center; gap: 20px; margin-top: 8px; font-size: 10px; }
    .timeout-indicator { display: flex; align-items: center; gap: 4px; }
    .timeout-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg-card3); border: 1px solid var(--muted); }
    .timeout-dot.used { background: var(--warning); border-color: var(--warning); }
    
    .court-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 12px; }
    .court-svg { width: 100%; height: auto; border-radius: 8px; }
    
    .oncourt-section { margin-bottom: 12px; }
    .oncourt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .oncourt-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .oncourt-count { font-size: 11px; padding: 3px 8px; background: var(--bg-card2); border-radius: 5px; }
    .oncourt-count.ok { color: var(--success); }
    .oncourt-count.error { color: var(--danger); }
    .oncourt-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .oncourt-grid.four { grid-template-columns: repeat(4, 1fr); }
    .player-chip { background: var(--bg-card2); border: 2px solid var(--border); border-radius: 8px; padding: 6px 4px; text-align: center; cursor: pointer; transition: all 0.15s; position: relative; }
    .player-chip.on-court { border-color: var(--success); background: rgba(46,204,113,0.1); }
    .player-chip.selected { border-color: var(--orange); background: rgba(255,107,26,0.15); box-shadow: 0 0 10px var(--orange-glow); }
    .player-chip.fouled-out { border-color: var(--danger); opacity: 0.4; }
    .player-chip.injured { border-color: var(--danger); background: rgba(255,59,92,0.1); }
    .player-chip.tired { border-color: var(--warning); background: rgba(255,154,60,0.1); }
    .player-chip-num { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; color: var(--orange); }
    .player-chip.on-court .player-chip-num { color: var(--success); }
    .player-chip-name { font-size: 8px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .player-chip-stats { display: flex; justify-content: center; gap: 4px; margin-top: 3px; font-size: 8px; }
    .player-chip-stat b { display: block; font-weight: 700; }
    .player-chip-sextos { font-size: 7px; color: var(--muted); margin-top: 2px; }
    .player-chip-sextos .played { color: var(--success); }
    .player-chip-sextos .rested { color: var(--warning); }
    .player-chip-status { position: absolute; top: -4px; right: -4px; width: 14px; height: 14px; border-radius: 50%; font-size: 8px; display: flex; align-items: center; justify-content: center; }
    .player-chip-status.injured { background: var(--danger); }
    .player-chip-status.tired { background: var(--warning); }
    
    .actions-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; }
    .action-btn { background: var(--bg-card2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 4px; text-align: center; cursor: pointer; }
    .action-btn:active { transform: scale(0.95); }
    .action-btn:disabled { opacity: 0.4; pointer-events: none; }
    .action-btn.primary { background: linear-gradient(135deg, var(--orange), var(--orange-dim)); border-color: var(--orange); }
    .action-btn.danger { background: rgba(255,59,92,0.15); border-color: var(--danger); }
    .action-btn.warning { background: rgba(255,154,60,0.15); border-color: var(--warning); }
    .action-btn.info { background: rgba(91,200,255,0.15); border-color: var(--info); }
    .action-value { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: var(--orange); }
    .action-btn.primary .action-value { color: white; }
    .action-btn.danger .action-value { color: var(--danger); }
    .action-btn.warning .action-value { color: var(--warning); }
    .action-btn.info .action-value { color: var(--info); }
    .action-label { font-size: 7px; font-weight: 600; text-transform: uppercase; margin-top: 2px; color: var(--muted); }
    .action-btn.primary .action-label { color: rgba(255,255,255,0.9); }
    
    .control-buttons { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .ctrl-btn { flex: 1; min-width: 70px; padding: 10px 6px; border: none; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
    .ctrl-btn.secondary { background: var(--bg-card2); color: var(--white); border: 1px solid var(--border); }
    .ctrl-btn.warning { background: rgba(255,154,60,0.2); color: var(--warning); border: 1px solid var(--warning); }
    .ctrl-btn.danger { background: var(--danger); color: white; }
    .ctrl-btn.info { background: rgba(91,200,255,0.2); color: var(--info); border: 1px solid var(--info); }
    .ctrl-btn.purple { background: rgba(155,89,182,0.2); color: var(--purple); border: 1px solid var(--purple); }
    
    .sexto-tracker { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 12px; overflow-x: auto; }
    .sexto-table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 360px; }
    .sexto-table th { padding: 5px 3px; text-align: center; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
    .sexto-table th:first-child { text-align: left; }
    .sexto-table td { padding: 5px 3px; text-align: center; border-bottom: 1px solid var(--border); }
    .sexto-table td:first-child { text-align: left; }
    .sexto-player-cell { display: flex; align-items: center; gap: 5px; }
    .sexto-player-num { width: 18px; height: 18px; background: var(--orange); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; }
    .sexto-cell { width: 20px; height: 20px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 8px; }
    .sexto-cell.played { background: var(--success); color: white; }
    .sexto-cell.rested { background: var(--bg-card3); color: var(--muted); }
    .sexto-cell.current { background: var(--orange); color: white; animation: pulse 1s infinite; }
    .sexto-total { font-weight: 700; }
    .sexto-total.ok { color: var(--success); }
    .sexto-total.warning { color: var(--warning); }
    .sexto-total.error { color: var(--danger); }
    
    .pbp-section { background: var(--bg-card); border-radius: var(--radius); padding: 10px; border: 1px solid var(--border); margin-top: 12px; }
    .pbp-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
    .pbp-list { max-height: 180px; overflow-y: auto; }
    .pbp-item { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
    .pbp-time { color: var(--muted); width: 38px; flex-shrink: 0; font-size: 10px; }
    .pbp-action { flex: 1; }
    .pbp-action strong { color: var(--white); }
    .pbp-action .pts { color: var(--success); }
    .pbp-action .foul { color: var(--danger); }
    .pbp-action .sub { color: var(--info); }
    .pbp-action .timeout { color: var(--warning); }
    .pbp-action .injury { color: var(--danger); }
    
    /* WHITEBOARD */
    .whiteboard-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; }
    .whiteboard-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .whiteboard-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; }
    .whiteboard-tools { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
    .wb-tool { width: 34px; height: 34px; background: var(--bg-card2); border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: var(--white); }
    .wb-tool:hover { border-color: var(--orange); }
    .wb-tool.active { background: var(--orange); border-color: var(--orange); }
    .wb-separator { width: 1px; height: 34px; background: var(--border); margin: 0 4px; }
    .wb-color { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; }
    .wb-color.active { border-color: var(--white); box-shadow: 0 0 0 2px var(--orange); }
    .whiteboard-canvas { width: 100%; aspect-ratio: 16/10; border-radius: 8px; cursor: crosshair; touch-action: none; }
    .whiteboard-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    
    /* ANALYSIS */
    .analysis-tabs { display: flex; background: var(--bg-card2); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 14px; }
    .analysis-tab { flex: 1; padding: 8px; border: none; border-radius: 6px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; background: transparent; color: var(--muted); text-align: center; }
    .analysis-tab.active { background: var(--orange); color: white; }
    
    .player-stats-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
    .player-stats-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .player-stats-number { width: 36px; height: 36px; background: var(--orange); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; }
    .player-stats-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; }
    .player-stats-position { font-size: 11px; color: var(--muted); }
    .player-stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .player-stat-item { background: var(--bg-card2); border-radius: 6px; padding: 8px 4px; text-align: center; }
    .player-stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: var(--orange); }
    .player-stat-label { font-size: 8px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
    
    /* PERFORMANCE PROFILE */
    .performance-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-top: 10px; }
    .performance-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .performance-bars { display: flex; flex-direction: column; gap: 8px; }
    .performance-bar { display: flex; align-items: center; gap: 8px; }
    .performance-label { width: 60px; font-size: 10px; color: var(--muted); text-transform: uppercase; }
    .performance-track { flex: 1; height: 20px; background: var(--bg-card2); border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; }
    .performance-fill { height: 100%; border-radius: 10px; transition: width 0.3s; }
    .performance-fill.attack { background: linear-gradient(90deg, var(--orange-dim), var(--orange)); }
    .performance-fill.rebound { background: linear-gradient(90deg, #1e8449, var(--success)); }
    .performance-fill.defense { background: linear-gradient(90deg, #1a5276, var(--info)); }
    .performance-fill.shooting { background: linear-gradient(90deg, #7d3c98, var(--purple)); }
    .performance-fill.rhythm { background: linear-gradient(90deg, #b9770e, var(--warning)); }
    .performance-value { width: 30px; text-align: right; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; }
    
    /* PROFILE */
    .profile-header { text-align: center; padding: 20px 14px; }
    .profile-avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--orange); margin: 0 auto 14px; background: var(--bg-card2); display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; }
    .profile-edit-btn { position: absolute; bottom: 0; right: 0; width: 28px; height: 28px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border: 2px solid var(--bg-dark); }
    .profile-name { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; }
    .profile-role { display: inline-block; background: var(--orange); padding: 3px 12px; border-radius: 15px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 4px; }
    .profile-club { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .profile-stats { display: flex; justify-content: center; gap: 24px; margin-top: 20px; }
    .profile-stat { text-align: center; }
    .profile-stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: var(--orange); }
    .profile-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }
    
    .settings-section { margin-bottom: 18px; }
    .settings-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--orange); margin-bottom: 8px; padding: 0 4px; }
    .settings-list { background: var(--bg-card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .settings-item { display: flex; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .settings-item:last-child { border-bottom: none; }
    .settings-item:hover { background: var(--bg-card2); }
    .settings-icon { width: 32px; height: 32px; background: var(--bg-card2); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 16px; }
    .settings-text { flex: 1; }
    .settings-label { font-size: 14px; font-weight: 500; }
    .settings-value { font-size: 12px; color: var(--muted); }
    .settings-arrow { color: var(--muted); font-size: 16px; }
    
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: var(--bg-card); border-radius: var(--radius); width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
    .modal-header { padding: 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; text-transform: uppercase; }
    .modal-close { width: 30px; height: 30px; background: var(--bg-card2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .modal-body { padding: 14px; }
    .modal-footer { padding: 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 14px; background: var(--bg-card2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--white); font-family: 'Barlow', sans-serif; font-size: 15px; }
    .form-input:focus { outline: none; border-color: var(--orange); }
    .form-select { width: 100%; padding: 12px 14px; background: var(--bg-card2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--white); font-size: 15px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    .btn { padding: 12px 20px; border: none; border-radius: var(--radius-sm); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-primary { background: var(--orange); color: white; }
    .btn-secondary { background: var(--bg-card2); color: var(--white); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger); color: white; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    
    .fab { position: fixed; bottom: 80px; right: 16px; width: 50px; height: 50px; background: var(--orange); border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; cursor: pointer; z-index: 90; box-shadow: 0 4px 15px var(--orange-glow); }
    
    .empty-state { text-align: center; padding: 50px 20px; }
    .empty-icon { font-size: 50px; margin-bottom: 12px; opacity: 0.4; }
    .empty-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .empty-text { color: var(--muted); font-size: 13px; }
    
    .toast { position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%); background: var(--bg-card); border: 1px solid var(--success); border-radius: var(--radius-sm); padding: 10px 16px; display: flex; align-items: center; gap: 8px; z-index: 300; font-size: 13px; }
    
    .sub-modal-list { display: flex; flex-direction: column; gap: 6px; max-height: 250px; overflow-y: auto; }
    .sub-modal-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg-card2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
    .sub-modal-item:hover { border-color: var(--orange); }
    .sub-modal-item.on-court { border-color: var(--success); background: rgba(46,204,113,0.1); }
    .sub-modal-item.injured { opacity: 0.5; pointer-events: none; }
    .sub-modal-num { width: 28px; height: 28px; background: var(--orange); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800; }
    .sub-modal-item.on-court .sub-modal-num { background: var(--success); }
    .sub-modal-name { flex: 1; font-size: 14px; font-weight: 600; }
    .sub-modal-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    .sub-modal-status.oncourt { background: rgba(46,204,113,0.2); color: var(--success); }
    .sub-modal-status.bench { background: rgba(122,133,153,0.2); color: var(--muted); }
    .sub-modal-status.injured { background: rgba(255,59,92,0.2); color: var(--danger); }
    .sub-modal-status.tired { background: rgba(255,154,60,0.2); color: var(--warning); }
    
    @media (min-width: 768px) { .main { max-width: 800px; margin: 0 auto; } .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script type="module">
    import { html, render, useState, useEffect, useRef, useCallback } from 'https://esm.sh/htm/preact/standalone';

    const STORAGE_KEY = 'statsplus_v5';
    const load = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } };
    const save = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    const uid = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

    const CONFIG = {
      minibasket: { name: 'Mini-Basket', periods: 6, periodName: 'Sexto', periodTime: 8 * 60, playersOnCourt: 5, minPeriodsPlayed: 2, minPeriodsRested: 2, maxFouls: 5, courtType: 'mini', timeouts: 2, description: '6 sextos × 8 min' },
      preminibasket: { name: 'PreMini', periods: 6, periodName: 'Sexto', periodTime: 6 * 60, playersOnCourt: 4, minPeriodsPlayed: 2, minPeriodsRested: 2, maxFouls: 5, courtType: 'mini', timeouts: 2, description: '6 sextos × 6 min' },
      fiba: { name: 'FIBA Senior', periods: 4, periodName: 'Cuarto', periodTime: 10 * 60, playersOnCourt: 5, minPeriodsPlayed: 0, minPeriodsRested: 0, maxFouls: 5, courtType: 'fiba', timeouts: 5, description: '4 cuartos × 10 min' }
    };

    const defaultState = () => ({
      mode: 'minibasket',
      user: { name: 'Entrenador', role: 'Entrenador', club: '' },
      teams: [],
      games: [],
      activeGame: null
    });

    const defaultPerformance = () => ({ attack: 50, rebound: 50, defense: 50, shooting: 50, rhythm: 50 });

    function MiniCourt() {
      return html`<svg class="court-svg" viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="300" height="180" fill="#C17F59" rx="4"/>
        <line x1="150" y1="0" x2="150" y2="180" stroke="white" stroke-width="2"/>
        <circle cx="150" cy="90" r="18" fill="none" stroke="white" stroke-width="2"/>
        <rect x="0" y="52" width="48" height="76" fill="#8B5A3C" stroke="white" stroke-width="2"/>
        <path d="M 48 52 A 22 22 0 0 1 48 128" fill="none" stroke="white" stroke-width="2"/>
        <circle cx="7" cy="90" r="7" fill="none" stroke="#FF6B1A" stroke-width="2"/>
        <line x1="4" y1="76" x2="4" y2="104" stroke="white" stroke-width="3"/>
        <rect x="252" y="52" width="48" height="76" fill="#8B5A3C" stroke="white" stroke-width="2"/>
        <path d="M 252 52 A 22 22 0 0 0 252 128" fill="none" stroke="white" stroke-width="2"/>
        <circle cx="293" cy="90" r="7" fill="none" stroke="#FF6B1A" stroke-width="2"/>
        <line x1="296" y1="76" x2="296" y2="104" stroke="white" stroke-width="3"/>
        <text x="150" y="174" text-anchor="middle" fill="white" font-size="8" opacity="0.5">MINI-BASKET</text>
      </svg>`;
    }

    function FIBACourt() {
      return html`<svg class="court-svg" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="300" height="160" fill="#C17F59" rx="4"/>
        <line x1="150" y1="0" x2="150" y2="160" stroke="white" stroke-width="2"/>
        <circle cx="150" cy="80" r="18" fill="none" stroke="white" stroke-width="2"/>
        <rect x="0" y="38" width="58" height="84" fill="#8B5A3C" stroke="white" stroke-width="2"/>
        <circle cx="58" cy="80" r="18" fill="none" stroke="white" stroke-width="2" stroke-dasharray="4,4"/>
        <path d="M 0 16 L 12 16 A 72 72 0 0 1 12 144 L 0 144" fill="none" stroke="white" stroke-width="2"/>
        <circle cx="13" cy="80" r="7" fill="none" stroke="#FF6B1A" stroke-width="2"/>
        <line x1="10" y1="66" x2="10" y2="94" stroke="white" stroke-width="3"/>
        <rect x="242" y="38" width="58" height="84" fill="#8B5A3C" stroke="white" stroke-width="2"/>
        <circle cx="242" cy="80" r="18" fill="none" stroke="white" stroke-width="2" stroke-dasharray="4,4"/>
        <path d="M 300 16 L 288 16 A 72 72 0 0 0 288 144 L 300 144" fill="none" stroke="white" stroke-width="2"/>
        <circle cx="287" cy="80" r="7" fill="none" stroke="#FF6B1A" stroke-width="2"/>
        <line x1="290" y1="66" x2="290" y2="94" stroke="white" stroke-width="3"/>
        <text x="150" y="154" text-anchor="middle" fill="white" font-size="8" opacity="0.5">FIBA</text>
      </svg>`;
    }

    function Whiteboard({ mode }) {
      const canvasRef = useRef(null);
      const [tool, setTool] = useState('pencil');
      const [color, setColor] = useState('#FFFFFF');
      const [isDrawing, setIsDrawing] = useState(false);
      const [startPos, setStartPos] = useState(null);
      const ctxRef = useRef(null);
      const config = CONFIG[mode];

      const drawCourt = useCallback((ctx, w, h) => {
        ctx.fillStyle = '#C17F59';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();
        ctx.beginPath(); ctx.arc(w/2, h/2, h*0.12, 0, Math.PI * 2); ctx.stroke();
        
        if (config.courtType === 'mini') {
          const pw = w * 0.16, ph = h * 0.42, py = (h - ph) / 2;
          ctx.fillStyle = '#8B5A3C';
          ctx.fillRect(0, py, pw, ph); ctx.strokeRect(0, py, pw, ph);
          ctx.fillRect(w - pw, py, pw, ph); ctx.strokeRect(w - pw, py, pw, ph);
        } else {
          const pw = w * 0.19, ph = h * 0.52, py = (h - ph) / 2;
          ctx.fillStyle = '#8B5A3C';
          ctx.fillRect(0, py, pw, ph); ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5; ctx.strokeRect(0, py, pw, ph);
          ctx.beginPath(); ctx.moveTo(0, h * 0.1); ctx.lineTo(w * 0.04, h * 0.1); ctx.arc(w * 0.045, h/2, h * 0.42, -Math.PI/2 + 0.25, Math.PI/2 - 0.25); ctx.lineTo(0, h * 0.9); ctx.stroke();
          ctx.fillRect(w - pw, py, pw, ph); ctx.strokeRect(w - pw, py, pw, ph);
          ctx.beginPath(); ctx.moveTo(w, h * 0.1); ctx.lineTo(w * 0.96, h * 0.1); ctx.arc(w * 0.955, h/2, h * 0.42, -Math.PI/2 - 0.25, Math.PI/2 + 0.25, true); ctx.lineTo(w, h * 0.9); ctx.stroke();
        }
      }, [config.courtType]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctxRef.current = ctx;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * 2;
        canvas.height = rect.height * 2;
        ctx.scale(2, 2);
        drawCourt(ctx, rect.width, rect.height);
      }, [mode, drawCourt]);

      const getPos = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
      };

      const startDrawing = (e) => { e.preventDefault(); setIsDrawing(true); setStartPos(getPos(e)); };

      const draw = (e) => {
        if (!isDrawing || !startPos) return;
        e.preventDefault();
        const ctx = ctxRef.current;
        const pos = getPos(e);
        
        if (tool === 'pencil' || tool === 'marker') {
          ctx.strokeStyle = color; ctx.lineWidth = tool === 'pencil' ? 2 : 5; ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(startPos.x, startPos.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
          setStartPos(pos);
        } else if (tool === 'dashed') {
          ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.setLineDash([6, 4]);
          ctx.beginPath(); ctx.moveTo(startPos.x, startPos.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
          ctx.setLineDash([]);
          setStartPos(pos);
        }
      };

      const stopDrawing = (e) => {
        if (!isDrawing || !startPos) return;
        const ctx = ctxRef.current;
        const pos = e.changedTouches ? { x: e.changedTouches[0].clientX - canvasRef.current.getBoundingClientRect().left, y: e.changedTouches[0].clientY - canvasRef.current.getBoundingClientRect().top } : getPos(e);

        if (tool === 'arrow') {
          const angle = Math.atan2(pos.y - startPos.y, pos.x - startPos.x);
          ctx.strokeStyle = color; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(startPos.x, startPos.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
          const headLen = 10;
          ctx.beginPath(); ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x - headLen * Math.cos(angle - Math.PI/6), pos.y - headLen * Math.sin(angle - Math.PI/6));
          ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x - headLen * Math.cos(angle + Math.PI/6), pos.y - headLen * Math.sin(angle + Math.PI/6)); ctx.stroke();
        } else if (tool === 'player') {
          ctx.fillStyle = color; ctx.beginPath(); ctx.arc(pos.x, pos.y, 12, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
        } else if (tool === 'opponent') {
          ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(pos.x - 9, pos.y - 9); ctx.lineTo(pos.x + 9, pos.y + 9);
          ctx.moveTo(pos.x + 9, pos.y - 9); ctx.lineTo(pos.x - 9, pos.y + 9); ctx.stroke();
        } else if (tool === 'ball') {
          ctx.fillStyle = '#FF6B1A'; ctx.beginPath(); ctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2); ctx.fill();
        } else if (tool === 'cone') {
          ctx.fillStyle = '#FF9A3C'; ctx.beginPath(); ctx.moveTo(pos.x, pos.y - 12); ctx.lineTo(pos.x - 9, pos.y + 8); ctx.lineTo(pos.x + 9, pos.y + 8); ctx.closePath(); ctx.fill();
        } else if (tool === 'screen') {
          ctx.fillStyle = color; ctx.fillRect(pos.x - 14, pos.y - 4, 28, 8);
        }
        setIsDrawing(false); setStartPos(null);
      };

      const clearCanvas = () => { const rect = canvasRef.current.getBoundingClientRect(); drawCourt(ctxRef.current, rect.width, rect.height); };

      const tools = [
        { id: 'pencil', icon: '✏️' }, { id: 'marker', icon: '🖊️' }, { id: 'arrow', icon: '➜' },
        { id: 'dashed', icon: '┅' }, { id: 'player', icon: '●' }, { id: 'opponent', icon: '✕' },
        { id: 'ball', icon: '🏀' }, { id: 'cone', icon: '▲' }, { id: 'screen', icon: '▬' }
      ];
      const colors = ['#FFFFFF', '#5BC8FF', '#2ECC71', '#FF6B1A', '#FF3B5C', '#FFB800'];

      return html`
        <div class="whiteboard-container">
          <div class="whiteboard-header">
            <div class="whiteboard-title">📋 Pizarra Táctica</div>
            <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 11px;" onClick=${clearCanvas}>🗑️ Limpar</button>
          </div>
          <div class="whiteboard-tools">
            ${tools.map(t => html`<button key=${t.id} class=${'wb-tool' + (tool === t.id ? ' active' : '')} onClick=${() => setTool(t.id)}>${t.icon}</button>`)}
            <div class="wb-separator"></div>
            ${colors.map(c => html`<div key=${c} class=${'wb-color' + (color === c ? ' active' : '')} style=${{ backgroundColor: c }} onClick=${() => setColor(c)}></div>`)}
          </div>
          <canvas ref=${canvasRef} class="whiteboard-canvas" onMouseDown=${startDrawing} onMouseMove=${draw} onMouseUp=${stopDrawing} onMouseLeave=${stopDrawing} onTouchStart=${startDrawing} onTouchMove=${draw} onTouchEnd=${stopDrawing}></canvas>
          <div class="whiteboard-legend">
            <div class="legend-item">● Xogador</div>
            <div class="legend-item">✕ Defensor</div>
            <div class="legend-item">➜ Movemento</div>
            <div class="legend-item">┅ Pase</div>
            <div class="legend-item">▬ Bloqueo</div>
            <div class="legend-item">▲ Cono</div>
          </div>
        </div>
      `;
    }

    function PerformanceProfile({ player, onUpdate, editable = true }) {
      const perf = player.performance || defaultPerformance();
      const attrs = [
        { key: 'attack', label: 'Ataque', color: 'attack' },
        { key: 'rebound', label: 'Rebote', color: 'rebound' },
        { key: 'defense', label: 'Defensa', color: 'defense' },
        { key: 'shooting', label: 'Tiro', color: 'shooting' },
        { key: 'rhythm', label: 'Ritmo', color: 'rhythm' }
      ];

      const handleClick = (key, e) => {
        if (!editable || !onUpdate) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const newVal = Math.round((x / rect.width) * 100);
        onUpdate({ ...perf, [key]: Math.max(0, Math.min(100, newVal)) });
      };

      return html`
        <div class="performance-section">
          <div class="performance-title">
            <span>📊 Perfil de Rendimento</span>
            ${editable && html`<span style="font-size: 9px; color: var(--muted);">Toca para editar</span>`}
          </div>
          <div class="performance-bars">
            ${attrs.map(a => html`
              <div key=${a.key} class="performance-bar">
                <div class="performance-label">${a.label}</div>
                <div class="performance-track" onClick=${(e) => handleClick(a.key, e)}>
                  <div class=${'performance-fill ' + a.color} style=${{ width: perf[a.key] + '%' }}></div>
                </div>
                <div class="performance-value">${perf[a.key]}</div>
              </div>
            `)}
          </div>
        </div>
      `;
    }

    function Toast({ message, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
      return html`<div class="toast">✓ ${message}</div>`;
    }

    function Header() {
      return html`<header class="header"><div class="logo"><div class="logo-icon">🏀</div><div class="logo-text"><span>STATS+</span> MINI</div></div></header>`;
    }

    function BottomNav({ active, onNavigate, hasActiveGame }) {
      const items = [
        { id: 'panel', icon: '📊', label: 'Panel' },
        { id: 'teams', icon: '👥', label: 'Equipos' },
        { id: 'whiteboard', icon: '📋', label: 'Pizarra' },
        { id: 'analysis', icon: '📈', label: 'Análise' },
        { id: 'profile', icon: '👤', label: 'Perfil' }
      ];
      return html`<nav class="bottom-nav">${items.map(i => html`<button key=${i.id} class=${'nav-item' + (active === i.id ? ' active' : '')} onClick=${() => onNavigate(i.id)}><span class="icon">${i.id === 'panel' && hasActiveGame ? '🔴' : i.icon}</span><span>${i.label}</span></button>`)}</nav>`;
    }

    function PanelScreen({ state, onStartGame, onModeChange, onContinueGame }) {
      const config = CONFIG[state.mode];
      const wins = state.games.filter(g => g.homeScore > g.awayScore).length;

      return html`
        <div class="main">
          <div class="mode-toggle">
            <button class=${'mode-btn' + (state.mode === 'minibasket' ? ' active' : '')} onClick=${() => onModeChange('minibasket')}>Mini</button>
            <button class=${'mode-btn' + (state.mode === 'preminibasket' ? ' active' : '')} onClick=${() => onModeChange('preminibasket')}>PreMini</button>
            <button class=${'mode-btn' + (state.mode === 'fiba' ? ' active' : '')} onClick=${() => onModeChange('fiba')}>FIBA</button>
          </div>
          <div class="info-box"><strong>${config.name}:</strong> ${config.description}. ${config.timeouts} tempos mortos.</div>
          ${state.activeGame ? html`
            <div class="card card-orange cta-card" onClick=${onContinueGame}>
              <div class="cta-icon">🔴</div>
              <div class="cta-content"><div class="cta-title">Partido en Curso</div><div class="cta-sub">${state.activeGame.homeTeam} vs ${state.activeGame.awayTeam}</div></div>
              <div class="cta-arrow">→</div>
            </div>
          ` : html`
            <div class="card card-orange cta-card" onClick=${onStartGame}>
              <div class="cta-icon">🏀</div>
              <div class="cta-content"><div class="cta-title">Novo Partido</div><div class="cta-sub">Comeza a rexistrar estatísticas</div></div>
              <div class="cta-arrow">→</div>
            </div>
          `}
          <div class="section-header"><div class="section-title">Estatísticas</div></div>
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Partidos</div><div class="stat-value">${state.games.length}</div></div>
            <div class="stat-card"><div class="stat-label">Vitorias</div><div class="stat-value" style="color: var(--success)">${wins}</div></div>
            <div class="stat-card"><div class="stat-label">% Vitorias</div><div class="stat-value">${state.games.length > 0 ? Math.round(wins/state.games.length*100) : 0}%</div></div>
            <div class="stat-card"><div class="stat-label">Equipos</div><div class="stat-value">${state.teams.length}</div></div>
          </div>
          <div class="section-header"><div class="section-title">Pista ${config.name}</div></div>
          <div class="court-container">${config.courtType === 'mini' ? html`<${MiniCourt} />` : html`<${FIBACourt} />`}</div>
        </div>
      `;
    }

    function TeamsScreen({ teams, mode, onAddTeam, onSelectTeam }) {
      const filtered = teams.filter(t => t.mode === mode);
      return html`
        <div class="main">
          <div class="section-header"><div class="section-title">Equipos (${CONFIG[mode].name})</div></div>
          ${filtered.length === 0 ? html`
            <div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Sen Equipos</div><div class="empty-text">Crea o teu primeiro equipo</div><button class="btn btn-primary" style="margin-top: 16px;" onClick=${onAddTeam}>+ Crear Equipo</button></div>
          ` : html`
            <div class="team-list">
              ${filtered.map(t => html`<div key=${t.id} class="team-card" onClick=${() => onSelectTeam(t)}><div class="team-logo">${t.emoji || '🏀'}</div><div class="team-info"><div class="team-name">${t.name}</div><div class="team-meta">${t.players?.length || 0} xogadores</div></div><div class=${'team-badge ' + t.mode}>${CONFIG[t.mode].name}</div></div>`)}
            </div>
          `}
        </div>
        <button class="fab" onClick=${onAddTeam}>+</button>
      `;
    }

    function TeamDetailScreen({ team, onBack, onAddPlayer, onDeletePlayer, onEditPlayer, onUpdateTeam }) {
      const [editingPlayer, setEditingPlayer] = useState(null);
      
      const updatePerformance = (playerId, perf) => {
        const updatedPlayers = team.players.map(p => p.id === playerId ? { ...p, performance: perf } : p);
        onUpdateTeam({ ...team, players: updatedPlayers });
      };

      return html`
        <div class="main">
          <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px;">
            <button class="btn btn-secondary" style="padding: 8px 12px;" onClick=${onBack}>←</button>
            <div style="flex: 1;">
              <div style="font-family: 'Barlow Condensed'; font-size: 20px; font-weight: 700;">${team.emoji} ${team.name}</div>
              <div style="font-size: 11px; color: var(--muted);">${CONFIG[team.mode].name} · ${team.players?.length || 0} xogadores</div>
            </div>
          </div>
          <div class="section-header"><div class="section-title">Plantilla</div><div class="section-link" onClick=${onAddPlayer}>+ Engadir</div></div>
          ${!team.players?.length ? html`
            <div class="card" style="text-align: center; padding: 30px;"><div style="font-size: 32px; margin-bottom: 8px;">👤</div><div style="color: var(--muted); font-size: 13px;">Sen xogadores</div><button class="btn btn-primary" style="margin-top: 12px;" onClick=${onAddPlayer}>+ Engadir Xogador</button></div>
          ` : html`
            <div class="player-list">
              ${team.players.map(p => html`
                <div key=${p.id}>
                  <div class="player-item" onClick=${() => setEditingPlayer(editingPlayer === p.id ? null : p.id)}>
                    <div class="player-number">${p.number}</div>
                    <div class="player-info"><div class="player-name">${p.name}</div><div class="player-position">${p.position || 'Sen posición'}</div></div>
                    <button class="player-action-btn" onClick=${(e) => { e.stopPropagation(); onDeletePlayer(p.id); }}>🗑️</button>
                  </div>
                  ${editingPlayer === p.id && html`<${PerformanceProfile} player=${p} onUpdate=${(perf) => updatePerformance(p.id, perf)} editable=${true} />`}
                </div>
              `)}
            </div>
          `}
        </div>
      `;
    }

    function LiveGameScreen({ game, mode, onUpdateGame, onEndGame }) {
      const config = CONFIG[mode];
      const [selectedPlayer, setSelectedPlayer] = useState(null);
      const [timer, setTimer] = useState(game.timer ?? config.periodTime);
      const [isRunning, setIsRunning] = useState(false);
      const [period, setPeriod] = useState(game.period || 1);
      const [showSubModal, setShowSubModal] = useState(false);
      const timerRef = useRef(null);

      useEffect(() => {
        if (isRunning && timer > 0) timerRef.current = setInterval(() => setTimer(t => t > 0 ? t - 1 : 0), 1000);
        return () => clearInterval(timerRef.current);
      }, [isRunning]);

      useEffect(() => { if (timer === 0) setIsRunning(false); }, [timer]);

      const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
      const players = game.players || [];
      const getPlayerSextos = (p) => ({ played: (p.periodsPlayed || []).length, rested: (p.periodsRested || []).length });

      const addPlay = (text, type = 'action') => {
        const newPlay = { time: formatTime(timer), text, type, period };
        onUpdateGame({ ...game, plays: [newPlay, ...(game.plays || [])], timer, period });
      };

      const handleAction = (type, value) => {
        if (!selectedPlayer) return;
        const player = players.find(p => p.id === selectedPlayer);
        if (!player) return;

        const updatedPlayers = players.map(p => {
          if (p.id !== selectedPlayer) return p;
          const stats = { ...p.stats };
          if (type === 'pts') stats.pts = (stats.pts || 0) + value;
          else if (type === 'reb') stats.reb = (stats.reb || 0) + 1;
          else if (type === 'ast') stats.ast = (stats.ast || 0) + 1;
          else if (type === 'stl') stats.stl = (stats.stl || 0) + 1;
          else if (type === 'blk') stats.blk = (stats.blk || 0) + 1;
          else if (type === 'foul') stats.foul = (stats.foul || 0) + 1;
          else if (type === 'to') stats.to = (stats.to || 0) + 1;
          return { ...p, stats };
        });

        const homeScore = type === 'pts' ? game.homeScore + value : game.homeScore;
        const playText = type === 'pts' ? `<strong>${player.name}</strong> <span class="pts">+${value} puntos</span>` :
          type === 'foul' ? `<strong>${player.name}</strong> <span class="foul">Falta persoal</span>` :
          `<strong>${player.name}</strong> ${type.toUpperCase()}`;
        
        const newPlay = { time: formatTime(timer), text: playText, type: type === 'foul' ? 'foul' : 'action', period };
        onUpdateGame({ ...game, players: updatedPlayers, plays: [newPlay, ...(game.plays || [])], homeScore, timer, period });
      };

      const handleTimeout = (team) => {
        const key = team === 'home' ? 'homeTimeouts' : 'awayTimeouts';
        const current = game[key] || 0;
        if (current >= config.timeouts) return;
        
        setIsRunning(false);
        const teamName = team === 'home' ? game.homeTeam : game.awayTeam;
        const newPlay = { time: formatTime(timer), text: `<span class="timeout">⏱️ TEMPO MORTO - ${teamName}</span>`, type: 'timeout', period };
        onUpdateGame({ ...game, [key]: current + 1, plays: [newPlay, ...(game.plays || [])], timer, period });
      };

      const handleInjury = (playerId) => {
        const player = players.find(p => p.id === playerId);
        if (!player) return;
        const updatedPlayers = players.map(p => p.id === playerId ? { ...p, injured: !p.injured, onCourt: p.injured ? p.onCourt : false } : p);
        const newPlay = { time: formatTime(timer), text: `<span class="injury">🏥 ${player.name} - ${player.injured ? 'Recuperado' : 'Lesionado'}</span>`, type: 'injury', period };
        onUpdateGame({ ...game, players: updatedPlayers, plays: [newPlay, ...(game.plays || [])], timer, period });
        if (selectedPlayer === playerId) setSelectedPlayer(null);
      };

      const handleTired = (playerId) => {
        const updatedPlayers = players.map(p => p.id === playerId ? { ...p, tired: !p.tired } : p);
        onUpdateGame({ ...game, players: updatedPlayers, timer, period });
      };

      const handleSubstitution = (playerIn, playerOut) => {
        const updatedPlayers = players.map(p => {
          if (p.id === playerIn) return { ...p, onCourt: true };
          if (p.id === playerOut) return { ...p, onCourt: false };
          return p;
        });
        const pIn = players.find(p => p.id === playerIn);
        const pOut = players.find(p => p.id === playerOut);
        const newPlay = { time: formatTime(timer), text: `<span class="sub">🔄 CAMBIO: Entra #${pIn.number} ${pIn.name.split(' ')[0]} / Sae #${pOut.number} ${pOut.name.split(' ')[0]}</span>`, type: 'sub', period };
        onUpdateGame({ ...game, players: updatedPlayers, plays: [newPlay, ...(game.plays || [])], timer, period });
        setShowSubModal(false);
      };

      const togglePlayer = (playerId) => {
        const player = players.find(p => p.id === playerId);
        if (!player || player.injured) return;
        const onCourtCount = players.filter(p => p.onCourt).length;
        
        if (player.onCourt) {
          setSelectedPlayer(playerId);
        } else {
          if (onCourtCount >= config.playersOnCourt) return;
          if ((player.stats?.foul || 0) >= config.maxFouls) return;
          onUpdateGame({ ...game, players: players.map(p => p.id === playerId ? { ...p, onCourt: true } : p) });
        }
        setSelectedPlayer(playerId);
      };

      const endPeriod = () => {
        const updatedPlayers = players.map(p => {
          const periodsPlayed = [...(p.periodsPlayed || [])];
          const periodsRested = [...(p.periodsRested || [])];
          if (p.onCourt) periodsPlayed.push(period);
          else periodsRested.push(period);
          return { ...p, periodsPlayed, periodsRested };
        });

        if (period < config.periods) {
          setPeriod(period + 1);
          setTimer(config.periodTime);
          setIsRunning(false);
          onUpdateGame({ ...game, players: updatedPlayers, period: period + 1, timer: config.periodTime });
        } else {
          onEndGame();
        }
      };

      const onCourtCount = players.filter(p => p.onCourt).length;
      const onCourtPlayers = players.filter(p => p.onCourt);
      const benchPlayers = players.filter(p => !p.onCourt && !p.injured && (p.stats?.foul || 0) < config.maxFouls);

      return html`
        <div class="main">
          <div class="live-header">
            <div class="live-badge"><div class="live-dot"></div>${config.periodName} ${period}</div>
            <div class="live-scoreboard">
              <div class="live-team"><div class="live-team-logo home">${game.homeTeam?.substring(0,3).toUpperCase()}</div><div class="live-team-name">${game.homeTeam}</div></div>
              <div class="live-center">
                <div class="live-score"><span style="color: var(--white)">${game.homeScore}</span><span>-</span><span style="color: var(--white)">${game.awayScore}</span></div>
                <div class="live-timer" onClick=${() => setIsRunning(!isRunning)}>${formatTime(timer)} ${isRunning ? '⏸' : '▶'}</div>
                <div class="live-period">${config.periodName} ${period} de ${config.periods}</div>
                <div class="live-timeouts">
                  <div class="timeout-indicator">
                    <span style="font-size: 9px; margin-right: 4px;">Local:</span>
                    ${[...Array(config.timeouts)].map((_, i) => html`<div key=${i} class=${'timeout-dot' + (i < (game.homeTimeouts || 0) ? ' used' : '')}></div>`)}
                  </div>
                  <div class="timeout-indicator">
                    <span style="font-size: 9px; margin-right: 4px;">Rival:</span>
                    ${[...Array(config.timeouts)].map((_, i) => html`<div key=${i} class=${'timeout-dot' + (i < (game.awayTimeouts || 0) ? ' used' : '')}></div>`)}
                  </div>
                </div>
              </div>
              <div class="live-team"><div class="live-team-logo away">${game.awayTeam?.substring(0,3).toUpperCase()}</div><div class="live-team-name">${game.awayTeam}</div></div>
            </div>
          </div>
          
          <div class="court-container">${config.courtType === 'mini' ? html`<${MiniCourt} />` : html`<${FIBACourt} />`}</div>
          
          <div class="oncourt-section">
            <div class="oncourt-header">
              <div class="oncourt-title">Xogadores</div>
              <div class=${'oncourt-count ' + (onCourtCount === config.playersOnCourt ? 'ok' : 'error')}>En pista: ${onCourtCount}/${config.playersOnCourt}</div>
            </div>
            <div class=${'oncourt-grid' + (config.playersOnCourt === 4 ? ' four' : '')}>
              ${players.map(p => {
                const { played, rested } = getPlayerSextos(p);
                const fouledOut = (p.stats?.foul || 0) >= config.maxFouls;
                let cls = 'player-chip';
                if (p.onCourt) cls += ' on-court';
                if (selectedPlayer === p.id) cls += ' selected';
                if (fouledOut) cls += ' fouled-out';
                if (p.injured) cls += ' injured';
                if (p.tired && !p.onCourt) cls += ' tired';
                
                return html`
                  <div key=${p.id} class=${cls} onClick=${() => !fouledOut && !p.injured && togglePlayer(p.id)}>
                    ${p.injured && html`<div class="player-chip-status injured">🏥</div>`}
                    ${p.tired && !p.injured && html`<div class="player-chip-status tired">😓</div>`}
                    <div class="player-chip-num">${p.number}</div>
                    <div class="player-chip-name">${p.name.split(' ')[0]}</div>
                    <div class="player-chip-stats">
                      <div class="player-chip-stat"><b>${p.stats?.pts || 0}</b>P</div>
                      <div class="player-chip-stat"><b>${p.stats?.foul || 0}</b>F</div>
                    </div>
                    ${mode !== 'fiba' && html`<div class="player-chip-sextos"><span class="played">${played}X</span>/<span class="rested">${rested}D</span></div>`}
                  </div>
                `;
              })}
            </div>
          </div>
          
          <div class="actions-grid">
            <button class="action-btn primary" onClick=${() => handleAction('pts', 2)} disabled=${!selectedPlayer}><div class="action-value">+2</div><div class="action-label">Campo</div></button>
            <button class="action-btn primary" onClick=${() => handleAction('pts', 3)} disabled=${!selectedPlayer || mode !== 'fiba'} style=${mode !== 'fiba' ? 'opacity: 0.3;' : ''}><div class="action-value">+3</div><div class="action-label">Triple</div></button>
            <button class="action-btn primary" onClick=${() => handleAction('pts', 1)} disabled=${!selectedPlayer}><div class="action-value">+1</div><div class="action-label">Libre</div></button>
            <button class="action-btn" onClick=${() => handleAction('reb', 1)} disabled=${!selectedPlayer}><div class="action-value">REB</div><div class="action-label">Rebote</div></button>
            <button class="action-btn" onClick=${() => handleAction('ast', 1)} disabled=${!selectedPlayer}><div class="action-value">AST</div><div class="action-label">Asist</div></button>
          </div>
          <div class="actions-grid">
            <button class="action-btn" onClick=${() => handleAction('stl', 1)} disabled=${!selectedPlayer}><div class="action-value">STL</div><div class="action-label">Roubo</div></button>
            <button class="action-btn" onClick=${() => handleAction('blk', 1)} disabled=${!selectedPlayer}><div class="action-value">BLK</div><div class="action-label">Tapón</div></button>
            <button class="action-btn danger" onClick=${() => handleAction('foul', 1)} disabled=${!selectedPlayer}><div class="action-value">PF</div><div class="action-label">Falta</div></button>
            <button class="action-btn" onClick=${() => handleAction('to', 1)} disabled=${!selectedPlayer}><div class="action-value">TO</div><div class="action-label">Perda</div></button>
            <button class="action-btn" onClick=${() => onUpdateGame({ ...game, awayScore: game.awayScore + 2 })}><div class="action-value">+2</div><div class="action-label">Rival</div></button>
          </div>
          
          <div class="control-buttons">
            <button class="ctrl-btn secondary" onClick=${() => setIsRunning(!isRunning)}>${isRunning ? '⏸ Pausa' : '▶ Iniciar'}</button>
            <button class="ctrl-btn info" onClick=${() => setShowSubModal(true)}>🔄 Cambio</button>
            <button class="ctrl-btn purple" onClick=${() => handleTimeout('home')}>⏱️ T.Morto</button>
          </div>
          <div class="control-buttons">
            <button class="ctrl-btn warning" onClick=${() => selectedPlayer && handleInjury(selectedPlayer)} disabled=${!selectedPlayer}>🏥 Lesión</button>
            <button class="ctrl-btn warning" onClick=${() => selectedPlayer && handleTired(selectedPlayer)} disabled=${!selectedPlayer}>😓 Cansado</button>
            <button class="ctrl-btn warning" onClick=${endPeriod}>Fin ${config.periodName}</button>
            <button class="ctrl-btn danger" onClick=${onEndGame}>Finalizar</button>
          </div>
          
          ${mode !== 'fiba' && html`
            <div class="sexto-tracker">
              <div class="section-title" style="margin-bottom: 8px;">Control de Participación</div>
              <table class="sexto-table">
                <thead><tr><th>Xogador</th>${[...Array(config.periods)].map((_, i) => html`<th key=${i}>${i+1}</th>`)}<th>X</th><th>D</th></tr></thead>
                <tbody>
                  ${players.map(p => {
                    const { played, rested } = getPlayerSextos(p);
                    return html`
                      <tr key=${p.id}>
                        <td><div class="sexto-player-cell"><div class="sexto-player-num">${p.number}</div>${p.name.split(' ')[0]}</div></td>
                        ${[...Array(config.periods)].map((_, i) => {
                          const pn = i + 1;
                          const wasPlayed = (p.periodsPlayed || []).includes(pn);
                          const wasRested = (p.periodsRested || []).includes(pn);
                          const isCurrent = pn === period && p.onCourt;
                          let cls = 'sexto-cell ';
                          if (isCurrent) cls += 'current';
                          else if (wasPlayed) cls += 'played';
                          else if (wasRested) cls += 'rested';
                          return html`<td key=${i}><span class=${cls}>${wasPlayed ? '✓' : wasRested ? '—' : isCurrent ? '●' : ''}</span></td>`;
                        })}
                        <td class=${'sexto-total ' + (played >= 2 ? 'ok' : 'warning')}>${played}</td>
                        <td class=${'sexto-total ' + (rested >= 2 ? 'ok' : 'warning')}>${rested}</td>
                      </tr>
                    `;
                  })}
                </tbody>
              </table>
            </div>
          `}
          
          <div class="pbp-section">
            <div class="pbp-title">📝 Crónica en Vivo</div>
            <div class="pbp-list">
              ${(game.plays || []).length === 0 ? html`<div style="text-align: center; color: var(--muted); padding: 16px; font-size: 12px;">As xogadas aparecerán aquí</div>` : 
                (game.plays || []).slice(0, 20).map((play, i) => html`<div key=${i} class="pbp-item"><div class="pbp-time">${play.time}</div><div class="pbp-action" dangerouslySetInnerHTML=${{ __html: play.text }}></div></div>`)}
            </div>
          </div>
        </div>
        
        ${showSubModal && html`
          <div class="modal-overlay" onClick=${() => setShowSubModal(false)}>
            <div class="modal" onClick=${e => e.stopPropagation()}>
              <div class="modal-header"><div class="modal-title">🔄 Substitución</div><button class="modal-close" onClick=${() => setShowSubModal(false)}>×</button></div>
              <div class="modal-body">
                <div class="form-group">
                  <label class="form-label">Selecciona quen sae</label>
                  <div class="sub-modal-list">
                    ${onCourtPlayers.map(p => html`
                      <div key=${p.id} class="sub-modal-item on-court" onClick=${() => {
                        if (benchPlayers.length > 0) {
                          const playerOut = p.id;
                          // Store for next selection
                          window._subPlayerOut = playerOut;
                        }
                      }}>
                        <div class="sub-modal-num">${p.number}</div>
                        <div class="sub-modal-name">${p.name}</div>
                        <div class="sub-modal-status oncourt">En pista</div>
                      </div>
                    `)}
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Selecciona quen entra</label>
                  <div class="sub-modal-list">
                    ${benchPlayers.map(p => html`
                      <div key=${p.id} class=${'sub-modal-item' + (p.tired ? ' tired' : '')} onClick=${() => {
                        const playerOut = onCourtPlayers[0]?.id;
                        if (playerOut) handleSubstitution(p.id, playerOut);
                      }}>
                        <div class="sub-modal-num">${p.number}</div>
                        <div class="sub-modal-name">${p.name}</div>
                        <div class=${'sub-modal-status ' + (p.tired ? 'tired' : 'bench')}>${p.tired ? 'Cansado' : 'Banquillo'}</div>
                      </div>
                    `)}
                  </div>
                </div>
              </div>
            </div>
          </div>
        `}
      `;
    }

    function WhiteboardScreen({ mode }) {
      return html`<div class="main"><${Whiteboard} mode=${mode} /></div>`;
    }

    function AnalysisScreen({ games, teams }) {
      const [tab, setTab] = useState('team');
      const [selectedGame, setSelectedGame] = useState(games[games.length - 1] || null);

      const totalStats = (game) => {
        if (!game?.players) return { pts: 0, reb: 0, ast: 0, stl: 0, blk: 0, to: 0, foul: 0 };
        return game.players.reduce((acc, p) => ({
          pts: acc.pts + (p.stats?.pts || 0),
          reb: acc.reb + (p.stats?.reb || 0),
          ast: acc.ast + (p.stats?.ast || 0),
          stl: acc.stl + (p.stats?.stl || 0),
          blk: acc.blk + (p.stats?.blk || 0),
          to: acc.to + (p.stats?.to || 0),
          foul: acc.foul + (p.stats?.foul || 0)
        }), { pts: 0, reb: 0, ast: 0, stl: 0, blk: 0, to: 0, foul: 0 });
      };

      return html`
        <div class="main">
          <div class="section-header"><div class="section-title">📈 Análise</div></div>
          
          ${games.length === 0 ? html`
            <div class="empty-state"><div class="empty-icon">📈</div><div class="empty-title">Sen Datos</div><div class="empty-text">Completa partidos para ver análise</div></div>
          ` : html`
            <div class="form-group">
              <label class="form-label">Selecciona Partido</label>
              <select class="form-select" value=${selectedGame?.id || ''} onChange=${e => setSelectedGame(games.find(g => g.id === e.target.value))}>
                ${games.slice().reverse().map(g => html`<option key=${g.id} value=${g.id}>${g.date} - ${g.homeTeam} vs ${g.awayTeam} (${g.homeScore}-${g.awayScore})</option>`)}
              </select>
            </div>
            
            <div class="analysis-tabs">
              <button class=${'analysis-tab' + (tab === 'team' ? ' active' : '')} onClick=${() => setTab('team')}>Equipo</button>
              <button class=${'analysis-tab' + (tab === 'players' ? ' active' : '')} onClick=${() => setTab('players')}>Xogadores</button>
            </div>
            
            ${tab === 'team' && selectedGame && html`
              <div class="card">
                <div style="text-align: center; margin-bottom: 14px;">
                  <div style="font-size: 12px; color: var(--muted);">${selectedGame.date}</div>
                  <div style="font-family: 'Barlow Condensed'; font-size: 18px; font-weight: 700; margin-top: 4px;">${selectedGame.homeTeam} vs ${selectedGame.awayTeam}</div>
                  <div style="font-family: 'Barlow Condensed'; font-size: 32px; font-weight: 900; color: var(--orange); margin-top: 4px;">${selectedGame.homeScore} - ${selectedGame.awayScore}</div>
                  <div style="font-size: 11px; color: ${selectedGame.homeScore > selectedGame.awayScore ? 'var(--success)' : 'var(--danger)'}; margin-top: 4px;">${selectedGame.homeScore > selectedGame.awayScore ? '✓ VITORIA' : '✕ DERROTA'}</div>
                </div>
                <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr);">
                  ${(() => {
                    const t = totalStats(selectedGame);
                    return html`
                      <div class="stat-card"><div class="stat-label">Puntos</div><div class="stat-value">${t.pts}</div></div>
                      <div class="stat-card"><div class="stat-label">Rebotes</div><div class="stat-value">${t.reb}</div></div>
                      <div class="stat-card"><div class="stat-label">Asist.</div><div class="stat-value">${t.ast}</div></div>
                      <div class="stat-card"><div class="stat-label">Roubos</div><div class="stat-value">${t.stl}</div></div>
                      <div class="stat-card"><div class="stat-label">Tapóns</div><div class="stat-value">${t.blk}</div></div>
                      <div class="stat-card"><div class="stat-label">Perdas</div><div class="stat-value" style="color: var(--danger)">${t.to}</div></div>
                      <div class="stat-card"><div class="stat-label">Faltas</div><div class="stat-value" style="color: var(--warning)">${t.foul}</div></div>
                      <div class="stat-card"><div class="stat-label">Rival</div><div class="stat-value" style="color: var(--muted)">${selectedGame.awayScore}</div></div>
                    `;
                  })()}
                </div>
              </div>
            `}
            
            ${tab === 'players' && selectedGame?.players && html`
              ${selectedGame.players.filter(p => p.stats && Object.values(p.stats).some(v => v > 0)).map(p => html`
                <div key=${p.id} class="player-stats-card">
                  <div class="player-stats-header">
                    <div class="player-stats-number">${p.number}</div>
                    <div>
                      <div class="player-stats-name">${p.name}</div>
                      <div class="player-stats-position">${p.position || ''}</div>
                    </div>
                  </div>
                  <div class="player-stats-grid">
                    <div class="player-stat-item"><div class="player-stat-value">${p.stats?.pts || 0}</div><div class="player-stat-label">PTS</div></div>
                    <div class="player-stat-item"><div class="player-stat-value">${p.stats?.reb || 0}</div><div class="player-stat-label">REB</div></div>
                    <div class="player-stat-item"><div class="player-stat-value">${p.stats?.ast || 0}</div><div class="player-stat-label">AST</div></div>
                    <div class="player-stat-item"><div class="player-stat-value">${p.stats?.stl || 0}</div><div class="player-stat-label">STL</div></div>
                    <div class="player-stat-item"><div class="player-stat-value">${p.stats?.blk || 0}</div><div class="player-stat-label">BLK</div></div>
                  </div>
                  <div class="player-stats-grid" style="margin-top: 6px; grid-template-columns: repeat(3, 1fr);">
                    <div class="player-stat-item"><div class="player-stat-value" style="color: var(--danger)">${p.stats?.to || 0}</div><div class="player-stat-label">TO</div></div>
                    <div class="player-stat-item"><div class="player-stat-value" style="color: var(--warning)">${p.stats?.foul || 0}</div><div class="player-stat-label">Faltas</div></div>
                    <div class="player-stat-item"><div class="player-stat-value" style="color: var(--info)">${(p.periodsPlayed || []).length}</div><div class="player-stat-label">Sextos</div></div>
                  </div>
                  ${p.performance && html`<${PerformanceProfile} player=${p} editable=${false} />`}
                </div>
              `)}
            `}
          `}
        </div>
      `;
    }

    function ProfileScreen({ user, games, teams, onEditProfile }) {
      return html`
        <div class="main">
          <div class="profile-header">
            <div class="profile-avatar">👤<div class="profile-edit-btn" onClick=${onEditProfile}>✏️</div></div>
            <div class="profile-name">${user.name}</div>
            <div class="profile-role">${user.role}</div>
            ${user.club && html`<div class="profile-club">${user.club}</div>`}
            <div class="profile-stats">
              <div class="profile-stat"><div class="profile-stat-val">${games.length}</div><div class="profile-stat-lbl">Partidos</div></div>
              <div class="profile-stat"><div class="profile-stat-val">${teams.length}</div><div class="profile-stat-lbl">Equipos</div></div>
              <div class="profile-stat"><div class="profile-stat-val">${games.filter(g => g.homeScore > g.awayScore).length}</div><div class="profile-stat-lbl">Vitorias</div></div>
            </div>
          </div>
          <div class="settings-section">
            <div class="settings-title">Perfil</div>
            <div class="settings-list">
              <div class="settings-item" onClick=${onEditProfile}><div class="settings-icon">👤</div><div class="settings-text"><div class="settings-label">Editar Perfil</div><div class="settings-value">Nome, rol, club</div></div><div class="settings-arrow">›</div></div>
            </div>
          </div>
          <div style="text-align: center; padding: 16px; color: var(--muted); font-size: 11px;">STATS+ MINI v5.0<br/>Mini-Basket Galego + FIBA</div>
        </div>
      `;
    }

    // MODALS
    function NewTeamModal({ mode, onClose, onSave }) {
      const [name, setName] = useState('');
      const [emoji, setEmoji] = useState('🏀');
      const emojis = ['🏀', '⚡', '🔥', '🦁', '🐺', '🦅', '🐻', '🌟', '💪', '🎯'];
      
      return html`
        <div class="modal-overlay" onClick=${e => e.target === e.currentTarget && onClose()}>
          <div class="modal">
            <div class="modal-header"><div class="modal-title">Novo Equipo</div><button class="modal-close" onClick=${onClose}>×</button></div>
            <div class="modal-body">
              <div class="form-group"><label class="form-label">Nome</label><input type="text" class="form-input" placeholder="Nome do equipo" value=${name} onInput=${e => setName(e.target.value)} /></div>
              <div class="form-group"><label class="form-label">Icona</label><div style="display: flex; gap: 6px; flex-wrap: wrap;">${emojis.map(e => html`<button key=${e} type="button" style=${{ width: '40px', height: '40px', fontSize: '20px', background: emoji === e ? 'var(--orange)' : 'var(--bg-card2)', border: '1px solid ' + (emoji === e ? 'var(--orange)' : 'var(--border)'), borderRadius: '8px', cursor: 'pointer' }} onClick=${() => setEmoji(e)}>${e}</button>`)}</div></div>
              <div class="form-group"><label class="form-label">Categoría</label><div class="form-input" style="background: var(--bg-card3);">${CONFIG[mode].name}</div></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" style="flex: 1;" onClick=${onClose}>Cancelar</button><button class="btn btn-primary" style="flex: 2;" disabled=${!name.trim()} onClick=${() => onSave({ name: name.trim(), emoji, mode })}>Crear</button></div>
          </div>
        </div>
      `;
    }

    function NewPlayerModal({ onClose, onSave }) {
      const [name, setName] = useState('');
      const [number, setNumber] = useState('');
      const [position, setPosition] = useState('');
      
      return html`
        <div class="modal-overlay" onClick=${e => e.target === e.currentTarget && onClose()}>
          <div class="modal">
            <div class="modal-header"><div class="modal-title">Novo Xogador</div><button class="modal-close" onClick=${onClose}>×</button></div>
            <div class="modal-body">
              <div class="form-group"><label class="form-label">Nome</label><input type="text" class="form-input" placeholder="Nome completo" value=${name} onInput=${e => setName(e.target.value)} /></div>
              <div class="form-row">
                <div class="form-group"><label class="form-label">Dorsal</label><input type="number" class="form-input" placeholder="00" min="0" max="99" value=${number} onInput=${e => setNumber(e.target.value)} /></div>
                <div class="form-group"><label class="form-label">Posición</label><select class="form-select" value=${position} onChange=${e => setPosition(e.target.value)}><option value="">Seleccionar</option><option value="Base">Base</option><option value="Escolta">Escolta</option><option value="Aleiro">Aleiro</option><option value="Ala-Pívot">Ala-Pívot</option><option value="Pívot">Pívot</option></select></div>
              </div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" style="flex: 1;" onClick=${onClose}>Cancelar</button><button class="btn btn-primary" style="flex: 2;" disabled=${!name.trim() || !number} onClick=${() => onSave({ name: name.trim(), number: parseInt(number), position, performance: defaultPerformance() })}>Engadir</button></div>
          </div>
        </div>
      `;
    }

    function NewGameModal({ mode, teams, onClose, onStart }) {
      const [homeTeam, setHomeTeam] = useState('');
      const [awayTeam, setAwayTeam] = useState('');
      const [selectedTeamId, setSelectedTeamId] = useState('');
      const filtered = teams.filter(t => t.mode === mode);
      const selectedTeam = filtered.find(t => t.id === selectedTeamId);
      const config = CONFIG[mode];
      
      return html`
        <div class="modal-overlay" onClick=${e => e.target === e.currentTarget && onClose()}>
          <div class="modal">
